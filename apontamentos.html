<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<title>Apontamento Entrega Cana</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/StyleApto.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/spa-utils.js"></script>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-custom px-3">
<span class="navbar-brand">
<div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-truck"></i>  Campo 4.0 -  Controle de Apontamentos</h3>
</div>
</span>

<a class="nav-link text-white" href="javascript:void(0)" onclick="sair()">
<i class="bi bi-box-arrow-left"></i> Sair
</a>
</nav>

<div class="container mt-4">

<!-- FORM -->
<div id="formTela" class="card shadow card-custom">
<div class="card-body">

<h6 class="mb-3 text-success">
<i class="bi bi-clipboard-data"></i> Lançamento
</h6>

<form id="formApontamento">

<div class="row g-2" id="formCampos">

<div class="col-md-2 col-6">
<label>Data</label>
<input type="date" id="data_lancamento" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Turno</label>
<select id="turno" class="form-select">
<option value="">Selecione</option>
<option>Diurno</option>
<option>Noturno</option>
</select>
</div>

<div class="col-md-2 col-6">
<label>Frota</label>
<input id="frota" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Motorista</label>
<input id="motorista" class="form-control">
</div>

<div class="col-md-3 col-12">
<label>Líder/Gestor</label>
<input id="lider_gestor" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Local Saída</label>
<input id="saida" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Hrs Saída</label>
<input type="time" id="hora_saida" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Destino</label>
<input id="destino" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Hrs Chegada</label>
<input type="time" id="hora_chegada" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Peso Líquido</label>
<input type="number" id="peso_liquido" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Peso Bruto</label>
<input type="number" id="peso_bruto" class="form-control">
</div>

<div class="col-md-12">
<label>Informações</label>
<input id="informacoes_adicionais" class="form-control">
</div>

</div>

<!-- BOTÕES PADRÃO -->
<div class="mt-3 text-end">

<button type="submit" class="btn btn-success">
<i class="bi bi-save"></i> Salvar
</button>

<button type="button" class="btn btn-secondary" onclick="limparFormulario()">
Cancelar
</button>

<button type="button" class="btn btn-primary" onclick="mostrarTabela()">
<i class="bi bi-table"></i> Registros
</button>

</div>

</form>
</div>
</div>

<!-- TABELA -->
<div id="tabelaTela" class="mt-4" style="display:none;">

<!-- FILTROS -->
<div class="card p-0 mb-2">
  <div class="filter-header" onclick="toggleFiltrosApontamento()">
    <i class="bi bi-funnel filter-icon"></i>
    <span>Filtros de Pesquisa</span>
    <i class="bi bi-chevron-down toggle-icon"></i>
  </div>

  <div id="filtrosApontamentoContent" class="filter-content">
    <div class="row g-2 p-2">

      <div class="col-md-3 col-12">
        <input id="fFrota" placeholder="Frota" class="form-control">
      </div>

      <div class="col-md-3 col-12">
        <input id="fMotorista" placeholder="Motorista" class="form-control">
      </div>

      <div class="col-md-3 col-12">
        <select id="fTurno" class="form-control">
          <option value="">Todos</option>
          <option>Diurno</option>
          <option>Noturno</option>
        </select>
      </div>

      <div class="col-md-3 text-end">
        <button class="btn btn-primary" onclick="carregar()">Buscar</button>
        <button class="btn btn-secondary" onclick="limparFiltros()">Limpar</button>
        <button class="btn btn-dark" onclick="voltarFormulario()">Fechar</button>
      </div>

    </div>
  </div>
</div>

<!-- TABELA -->
<div class="card p-2 table-responsive">
<table class="table table-striped table-sm">
<thead>
<tr>
<th>ID</th>
<th>Data</th>
<th>Frota</th>
<th>Motorista</th>
<th>Destino</th>
<th>Peso</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/offline-sync.js"></script>
<script src="js/apontamento.js"></script>

<script>
// Toggle filtros colapsáveis
function toggleFiltrosApontamento() {
    const header = document.querySelector("#tabelaTela .filter-header");
    const content = document.getElementById("filtrosApontamentoContent");
    if (header && content) {
        header.classList.toggle("collapsed");
        content.classList.toggle("collapsed");
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
