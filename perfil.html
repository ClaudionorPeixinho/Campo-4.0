<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<meta charset="UTF-8">
<title>Perfil</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/supabase.js"></script>
<script defer src="js/perfil.js"></script>
</head>
<body>

<h3>Perfil</h3>

<p>Nome: <span id="nome"></span></p>
<p>Email: <span id="email"></span></p>

<button onclick="logout()">Sair</button>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
