<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#198754">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Campo 4.0">
    <link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
    <link rel="stylesheet" href="css/app-base.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Perdas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #27ae60;
            --primary-dark: #219a52;
            --primary-light: #2ecc71;
            --secondary-color: #3498db;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --success-color: #27ae60;
            --dark-color: #2c3e50;
            --gray-color: #95a5a6;
            --light-color: #ecf0f1;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Dark Mode */
        body.dark {
            --white: #1a1a1a;
            --light-color: #2d2d2d;
            --dark-color: #e0e0e0;
            --gray-color: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
        }

        /* SPA Mode - Esconder header */
        body.spa-mode .topo {
            display: none;
        }

        /* Header Moderno */
        .topo {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 20px 30px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topo h5 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 !important;
        }

        .topo i {
            font-size: 1.8rem;
        }

        .topo-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-theme-toggle {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
        }

        .btn-theme-toggle:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        .btn-sair {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: var(--white);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-sair:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Card Principal */
        .card-principal {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        body.dark .card-principal {
            background: #2d2d2d;
            color: #e0e0e0;
        }

        @media (max-width: 768px) {
            .card-principal {
                padding: 20px;
            }
        }

        /* Seção de Formulário */
        .form-section {
            margin-bottom: 30px;
        }

        .form-section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--primary-color);
        }

        body.dark .form-section-title {
            color: var(--primary-light);
            border-bottom-color: var(--primary-light);
        }

        .form-section-title i {
            font-size: 1.5rem;
        }

        /* Grid de Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        /* Form Group */
        .form-group-modern {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group-modern label {
            font-weight: 600;
            color: var(--dark-color);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group-modern label i {
            color: var(--primary-color);
            font-size: 1rem;
        }

        .form-group-modern .label-hint {
            font-size: 0.8rem;
            color: var(--gray-color);
            font-weight: 400;
        }

        /* Input Moderno */
        .input-modern {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--white);
            color: var(--dark-color);
        }

        body.dark .input-modern {
            background: #3d3d3d;
            color: #e0e0e0;
            border-color: #555;
        }

        .input-modern:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
            background: var(--white);
        }

        body.dark .input-modern:focus {
            background: #3d3d3d;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2);
        }

        .input-modern::placeholder {
            color: var(--gray-color);
        }

        /* Input Group com Ícone */
        .input-group-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group-icon .icon-prefix {
            position: absolute;
            left: 14px;
            color: var(--primary-color);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .input-group-icon input {
            padding-left: 40px;
        }

        /* Input com Suffix */
        .input-group-suffix {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group-suffix .unit-label {
            position: absolute;
            right: 14px;
            color: var(--gray-color);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .input-group-suffix input {
            padding-right: 40px;
        }

        /* Botões */
        .btn-action {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, var(--primary-dark), #1b5e20);
        }

        .btn-secondary-modern {
            background: var(--light-color);
            color: var(--dark-color);
        }

        .btn-secondary-modern:hover {
            background: var(--gray-color);
            color: var(--white);
        }

        .btn-outline-modern {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline-modern:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        /* Botões de Exportação */
        .btn-success-modern {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-success-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, #229954, #1e8449);
        }

        .btn-info-modern {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-info-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, #2980b9, #1f618d);
        }

        .btn-whatsapp-modern {
            background: linear-gradient(135deg, #25d366, #20ba58);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-whatsapp-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, #20ba58, #1a8c47);
        }

        .btn-email-modern {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-email-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, #c0392b, #a93226);
        }

        /* Botões Action */
        .btn-group-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--light-color);
        }

        @media (max-width: 768px) {
            .btn-group-actions {
                justify-content: flex-start;
            }

            .btn-group-actions button {
                flex: 1;
                min-width: 120px;
            }
        }

        /* Seção de Registros */
        .registros-section {
            display: none;
            animation: slideIn 0.3s ease;
        }

        .registros-section.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .registros-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .registros-header h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        /* Filtros */
        .filters-collapse-header {
            margin-bottom: 15px;
        }

        .btn-collapse-filter {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            font-size: 0.95rem;
        }

        .btn-collapse-filter:hover {
            background: linear-gradient(135deg, #2980b9, #1f618d);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-collapse-filter i:last-child {
            transition: transform 0.3s ease;
        }

        .btn-collapse-filter.active i:last-child {
            transform: rotate(180deg);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filters-grid input {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        body.dark .filters-grid input {
            background: #3d3d3d;
            color: #e0e0e0;
            border-color: #555;
        }

        .filters-grid input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            animation: slideDown 0.3s ease;
        }

        .filter-buttons button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        /* Botões de Exportação */
        .export-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.05), rgba(52, 152, 219, 0.05));
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .export-buttons button {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .export-buttons button i {
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .export-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Tabela Moderna */
        .table-modern-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
        }

        .table-modern {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        .table-modern thead {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--white);
        }

        .table-modern th {
            padding: 16px;
            font-weight: 700;
            text-align: left;
            font-size: 0.95rem;
        }

        .table-modern td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--light-color);
            color: var(--dark-color);
        }

        body.dark .table-modern td {
            border-bottom: 1px solid #555;
            color: #e0e0e0;
        }

        .table-modern tbody tr {
            transition: all 0.2s ease;
        }

        .table-modern tbody tr:hover {
            background: var(--light-color);
        }

        body.dark .table-modern tbody tr:hover {
            background: #3d3d3d;
        }

        .table-modern tbody tr:last-child td {
            border-bottom: none;
        }

        /* Total Geral */
        .total-geral-box {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.05), rgba(46, 204, 113, 0.05));
            border-left: 4px solid var(--primary-color);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .total-geral-box .label {
            font-weight: 600;
            color: var(--dark-color);
            margin-right: 10px;
        }

        .total-geral-box .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Ações na Tabela */
        .btn-table-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn-edit {
            background: var(--secondary-color);
            color: var(--white);
        }

        .btn-edit:hover {
            background: #2980b9;
        }

        .btn-delete {
            background: var(--danger-color);
            color: var(--white);
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--light-color);
            margin-bottom: 15px;
        }

        .empty-state p {
            color: var(--gray-color);
            font-size: 1.1rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .topo {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .topo h5 {
                font-size: 1.2rem;
            }

            .topo-buttons {
                width: 100%;
                justify-content: flex-end;
            }

            .container {
                padding: 15px 10px;
            }

            .card-principal {
                padding: 15px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-group-modern label {
                font-size: 0.9rem;
            }

            .btn-group-actions {
                flex-direction: column;
                gap: 10px;
            }

            .btn-action {
                width: 100%;
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .btn-sair {
                padding: 10px 14px;
                font-size: 0.85rem;
            }

            .btn-theme-toggle {
                width: 45px;
                height: 45px;
                padding: 10px;
            }

            .table-modern th,
            .table-modern td {
                padding: 10px 8px;
                font-size: 0.8rem;
            }

            .table-modern-wrapper {
                margin-bottom: 15px;
            }

            .export-buttons {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .export-buttons button {
                padding: 10px 14px;
                font-size: 0.85rem;
            }

            .registros-header {
                flex-direction: column;
                gap: 10px;
            }

            .registros-header h3 {
                font-size: 1.1rem;
            }

            .filters-grid {
                gap: 10px;
            }

            .filters-grid input {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .btn-collapse-filter {
                padding: 10px 14px;
                font-size: 0.85rem;
            }

            .filter-buttons {
                gap: 8px;
            }

            .filter-buttons button {
                padding: 10px 14px;
                font-size: 0.85rem;
                flex: 1;
            }

            .total-geral-box {
                flex-direction: column;
                justify-content: center;
                gap: 10px;
            }

            .total-geral-box .label {
                margin-right: 0;
            }

            .total-geral-box .value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="topo">
        <div>
            <h5>
                <i class="bi bi-clipboard-data"></i> Controle de Perdas
            </h5>
        </div>
        <div class="topo-buttons">
            <button class="btn-theme-toggle" id="btnToggleTheme" title="Alternar tema">
                <i class="bi bi-brightness-high"></i>
            </button>
            <button class="btn-sair" onclick="sair()">
                <i class="bi bi-box-arrow-right"></i> Sair
            </button>
        </div>
    </header>

    <!-- Container Principal -->
    <div class="container">
        <div class="card-principal">

            <!-- FORMULÁRIO -->
            <div id="formulario">
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="bi bi-pencil-square"></i> Informações da Operação
                    </div>

                    <div class="form-grid">
                        <!-- Data -->
                        <div class="form-group-modern">
                            <label for="data">
                                <i class="bi bi-calendar-event"></i> Data da Operação
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-calendar-event icon-prefix"></i>
                                <input type="date" id="data" class="input-modern" style="padding-left: 40px;">
                            </div>
                        </div>

                        <!-- Liberação OS -->
                        <div class="form-group-modern">
                            <label for="liberacao">
                                <i class="bi bi-file-earmark"></i> Liberação (O.S)
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-file-earmark icon-prefix"></i>
                                <input type="text" id="liberacao" class="input-modern" placeholder="Ex: OS-001" style="padding-left: 40px;">
                            </div>
                        </div>

                        <!-- Lote -->
                        <div class="form-group-modern">
                            <label for="lote">
                                <i class="bi bi-box"></i> Lote
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-box icon-prefix"></i>
                                <input type="text" id="lote" class="input-modern" placeholder="Ex: L-001" style="padding-left: 40px;">
                            </div>
                        </div>

                        <!-- Quadra -->
                        <div class="form-group-modern">
                            <label for="quadra">
                                <i class="bi bi-grid-3x3"></i> Quadra
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-grid-3x3 icon-prefix"></i>
                                <input type="text" id="quadra" class="input-modern" placeholder="Ex: Q-A" style="padding-left: 40px;">
                            </div>
                        </div>

                        <!-- Equipamento -->
                        <div class="form-group-modern">
                            <label for="equipamento">
                                <i class="bi bi-gear"></i> Equipamento
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-gear icon-prefix"></i>
                                <input type="text" id="equipamento" class="input-modern" placeholder="Ex: Colhedora 01" style="padding-left: 40px;">
                            </div>
                        </div>

                        <!-- Operador -->
                        <div class="form-group-modern">
                            <label for="operador">
                                <i class="bi bi-person"></i> Operador
                            </label>
                            <div class="input-group-icon">
                                <i class="bi bi-person icon-prefix"></i>
                                <input type="text" id="operador" class="input-modern" placeholder="Nome do operador" style="padding-left: 40px;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção de Perdas -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="bi bi-graph-down"></i> Quantificação de Perdas
                    </div>

                    <div class="form-grid">
                        <!-- Tocos -->
                        <div class="form-group-modern">
                            <label for="tocos">
                                <i class="bi bi-plus-circle"></i> Tocos
                                <span class="label-hint">(Tc)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="tocos" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Pontas -->
                        <div class="form-group-modern">
                            <label for="pontas">
                                <i class="bi bi-plus-circle"></i> Pontas
                                <span class="label-hint">(Pt)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="pontas" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Lascas -->
                        <div class="form-group-modern">
                            <label for="lascas">
                                <i class="bi bi-plus-circle"></i> Lascas
                                <span class="label-hint">(Ls)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="lascas" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Pedaços -->
                        <div class="form-group-modern">
                            <label for="pedacos">
                                <i class="bi bi-plus-circle"></i> Pedaços
                                <span class="label-hint">(Pd)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="pedacos" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Inteiras -->
                        <div class="form-group-modern">
                            <label for="inteiras">
                                <i class="bi bi-plus-circle"></i> Inteiras
                                <span class="label-hint">(In)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="inteiras" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Toletes -->
                        <div class="form-group-modern">
                            <label for="toletes">
                                <i class="bi bi-plus-circle"></i> Toletes
                                <span class="label-hint">(Tl)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="toletes" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>

                        <!-- Palmitos -->
                        <div class="form-group-modern">
                            <label for="palmitos">
                                <i class="bi bi-plus-circle"></i> Palmitos
                                <span class="label-hint">(Pm)</span>
                            </label>
                            <div class="input-group-suffix">
                                <input type="number" id="palmitos" class="input-modern" placeholder="0" min="0">
                                <span class="unit-label">un</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Observação -->
                <div class="form-section">
                    <div class="form-group-modern form-grid full">
                        <label for="observacao">
                            <i class="bi bi-chat-left-text"></i> Observações
                        </label>
                        <textarea id="observacao" class="input-modern" placeholder="Digite aqui observações sobre a operação..." style="resize: vertical; min-height: 100px; padding: 12px 14px;"></textarea>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="btn-group-actions">
                    <button class="btn-action btn-secondary-modern" onclick="limpar()">
                        <i class="bi bi-arrow-clockwise"></i> Limpar
                    </button>
                    <button class="btn-action btn-primary-modern" onclick="salvar()">
                        <i class="bi bi-check-circle"></i> Salvar Registro
                    </button>
                    <button class="btn-action btn-outline-modern" onclick="abrirRegistros()">
                        <i class="bi bi-table"></i> Ver Registros
                    </button>
                </div>
            </div>

            <!-- REGISTROS -->
            <div id="registros" class="registros-section">
                <div class="registros-header">
                    <h3>
                        <i class="bi bi-table"></i> Registros de Perdas
                    </h3>
                    <button class="btn-action btn-secondary-modern" onclick="fecharRegistros()">
                        <i class="bi bi-x-circle"></i> Fechar
                    </button>
                </div>

                <!-- Filtros Collapse -->
                <div class="filters-collapse-header">
                    <button class="btn-collapse-filter" onclick="toggleFiltersCollapse()">
                        <i class="bi bi-funnel"></i> Filtros
                        <i class="bi bi-chevron-down" id="filterIcon"></i>
                    </button>
                </div>

                <!-- Filtros Retráteis -->
                <div class="filters-grid" id="filtersContainer" style="display: none;">
                    <input type="text" id="fEquipamento" placeholder="Filtrar por Equipamento" class="input-modern">
                    <input type="text" id="fLote" placeholder="Filtrar por Lote" class="input-modern">
                    <input type="text" id="fOperador" placeholder="Filtrar por Operador" class="input-modern">
                </div>

                <div class="filter-buttons" id="filterButtonsContainer" style="display: none;">
                    <button class="btn-action btn-primary-modern" onclick="filtrar()">
                        <i class="bi bi-search"></i> Pesquisar
                    </button>
                    <button class="btn-action btn-secondary-modern" onclick="limparFiltro()">
                        <i class="bi bi-arrow-clockwise"></i> Limpar Filtros
                    </button>
                </div>

                <!-- Botões de Exportação -->
                <div class="export-buttons">
                    <button class="btn-action btn-success-modern" onclick="exportarPDF()">
                        <i class="bi bi-file-pdf"></i> Exportar PDF
                    </button>
                    <button class="btn-action btn-info-modern" onclick="exportarExcel()">
                        <i class="bi bi-file-earmark-excel"></i> Exportar Excel
                    </button>
                    <button class="btn-action btn-whatsapp-modern" onclick="compartilharWhatsApp()">
                        <i class="bi bi-whatsapp"></i> WhatsApp
                    </button>
                    <button class="btn-action btn-email-modern" onclick="compartilharEmail()">
                        <i class="bi bi-envelope"></i> Email
                    </button>
                </div>

                <!-- Tabela -->
                <div class="table-modern-wrapper">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th><i class="bi bi-calendar"></i> Data</th>
                                <th><i class="bi bi-gear"></i> Equipamento</th>
                                <th><i class="bi bi-box"></i> Lote</th>
                                <th><i class="bi bi-person"></i> Operador</th>
                                <th style="text-align: right;"><i class="bi bi-graph-down"></i> Total</th>
                                <th style="text-align: center;"><i class="bi bi-gear"></i> Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela">
                        </tbody>
                    </table>
                </div>

                <!-- Total Geral -->
                <div class="total-geral-box">
                    <span class="label">Total Geral de Perdas:</span>
                    <span class="value" id="totalGeral">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/offline-sync.js"></script>
    <script type="module" src="js/perdas.js"></script>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js', { scope: './' })
                    .catch(err => console.warn('SW registration falhou:', err));
            });
        }

        // Definir data de hoje como padrão
        document.getElementById('data').valueAsDate = new Date();

        // Animação de foco suave
        document.querySelectorAll('.input-modern').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
