<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
    <title>Gestão de Entregas - Apontamentos</title>
    <link rel="stylesheet" href="css/styles-entregas.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <header class="header">
            <h1><i class="fas fa-truck"></i> Apontamento de Entregas</h1>
            <div class="export-options">
                <select id="exportFormat" class="export-select">
                    <option value="pdf">PDF</option>
                    <option value="excel">Excel</option>
                    <option value="jpg">JPG</option>
                </select>
                <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Exportar</button>
            </div>
        </header>

        <!-- Formulário de Lançamento -->
        <section class="form-section">
            <h2><i class="fas fa-plus-circle"></i> Novo Lançamento</h2>
            <form id="deliveryForm">
                <div class="form-grid">
                    <!-- Linha 1: Data e Turno -->
                    <div class="form-group">
                        <label for="data"><i class="fas fa-calendar-alt"></i> Data *</label>
                        <input type="date" id="data" name="data" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="turno"><i class="fas fa-clock"></i> Turno *</label>
                        <select id="turno" name="turno" required>
                            <option value="">Selecione</option>
                            <option value="matutino">Matutino</option>
                            <option value="vespertino">Vespertino</option>
                            <option value="noturno">Noturno</option>
                        </select>
                    </div>

                    <!-- Linha 2: Frota e Motorista -->
                    <div class="form-group">
                        <label for="frota"><i class="fas fa-truck"></i> Frota *</label>
                        <input type="text" id="frota" name="frota" required placeholder="Ex: FR-0123">
                    </div>
                    
                    <div class="form-group">
                        <label for="motorista"><i class="fas fa-user"></i> Motorista *</label>
                        <input type="text" id="motorista" name="motorista" required placeholder="Nome do motorista">
                    </div>

                    <!-- Linha 3: Líder/Gestor -->
                    <div class="form-group">
                        <label for="lider"><i class="fas fa-user-tie"></i> Líder/Gestor *</label>
                        <input type="text" id="lider" name="lider" required placeholder="Nome do líder/gestor">
                    </div>
                    
                    <div class="form-group">
                        <label for="local_saida"><i class="fas fa-map-marker-alt"></i> Local Saída *</label>
                        <input type="text" id="local_saida" name="local_saida" required placeholder="Local de origem">
                    </div>

                    <!-- Linha 4: Hora Saída e Destino -->
                    <div class="form-group">
                        <label for="hrs_saida"><i class="fas fa-clock"></i> Hrs Saída *</label>
                        <input type="time" id="hrs_saida" name="hrs_saida" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="destino"><i class="fas fa-location-dot"></i> Destino *</label>
                        <input type="text" id="destino" name="destino" required placeholder="Local de destino">
                    </div>

                    <!-- Linha 5: Hora Chegada e Peso Líquido -->
                    <div class="form-group">
                        <label for="hrs_chegada"><i class="fas fa-clock"></i> Hrs Chegada *</label>
                        <input type="time" id="hrs_chegada" name="hrs_chegada" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="peso_liquido"><i class="fas fa-weight-hanging"></i> Peso Líquido (kg) *</label>
                        <input type="number" id="peso_liquido" name="peso_liquido" required step="0.01" min="0" placeholder="0.00">
                    </div>

                    <!-- Linha 6: Peso Bruto -->
                    <div class="form-group">
                        <label for="peso_bruto"><i class="fas fa-weight-hanging"></i> Peso Bruto (kg) *</label>
                        <input type="number" id="peso_bruto" name="peso_bruto" required step="0.01" min="0" placeholder="0.00">
                    </div>
                    
                    <div class="form-group">
                        <label for="peso_tara"><i class="fas fa-calculator"></i> Tara (kg)</label>
                        <input type="number" id="peso_tara" name="peso_tara" step="0.01" min="0" placeholder="Calculado automático" readonly>
                    </div>

                    <!-- Linha 7: Informações Adicionais (full width) -->
                    <div class="form-group full-width">
                        <label for="informacoes_adicionais"><i class="fas fa-comment"></i> Informações Adicionais</label>
                        <textarea id="informacoes_adicionais" name="informacoes_adicionais" rows="3" placeholder="Observações, ocorrências, etc..."></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Salvar Lançamento</button>
                    <button type="reset" class="btn-reset"><i class="fas fa-undo"></i> Limpar</button>
                </div>
            </form>
        </section>

        <!-- Filtros -->
        <section class="filters-section">
            <div class="filters-header" onclick="toggleFilters()">
                <h3><i class="fas fa-filter"></i> Filtros</h3>
                <i class="fas fa-chevron-down" id="filterIcon"></i>
            </div>
            <div class="filters-content" id="filtersContent">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="filterTurno">Turno</label>
                        <select id="filterTurno">
                            <option value="">Todos</option>
                            <option value="matutino">Matutino</option>
                            <option value="vespertino">Vespertino</option>
                            <option value="noturno">Noturno</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterFrota">Frota</label>
                        <input type="text" id="filterFrota" placeholder="Filtrar por frota">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterMotorista">Motorista</label>
                        <input type="text" id="filterMotorista" placeholder="Filtrar por motorista">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterDestino">Destino</label>
                        <input type="text" id="filterDestino" placeholder="Filtrar por destino">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterDataInicio">Data Início</label>
                        <input type="date" id="filterDataInicio">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterDataFim">Data Fim</label>
                        <input type="date" id="filterDataFim">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterUltimas24h">Últimas 24h</label>
                        <input type="checkbox" id="filterUltimas24h" checked>
                    </div>
                </div>
                <div class="filter-actions">
                    <button id="applyFilters" class="btn-filter"><i class="fas fa-search"></i> Aplicar Filtros</button>
                    <button id="clearFilters" class="btn-clear"><i class="fas fa-times"></i> Limpar</button>
                </div>
            </div>
        </section>

        <!-- Controles da Tabela -->
        <div class="table-controls">
            <button id="toggleTable" class="btn-toggle">
                <i class="fas fa-eye"></i> <span>Ocultar Planilha</span>
            </button>
            <span class="records-info"><i class="fas fa-clock"></i> Registros das últimas 24h</span>
        </div>

        <!-- Tabela de Entregas -->
        <section class="table-section" id="tableSection">
            <div class="table-responsive">
                <table id="deliveryTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data</th>
                            <th>Turno</th>
                            <th>Frota</th>
                            <th>Motorista</th>
                            <th>Líder/Gestor</th>
                            <th>Local Saída</th>
                            <th>Hrs Saída</th>
                            <th>Destino</th>
                            <th>Hrs Chegada</th>
                            <th>Peso Bruto</th>
                            <th>Peso Líquido</th>
                            <th>Tara</th>
                            <th>Informações</th>
                            <th>Registro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Dados serão inseridos via JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2><i class="fas fa-edit"></i> Editar Lançamento</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editData">Data</label>
                        <input type="date" id="editData" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editTurno">Turno</label>
                        <select id="editTurno" required>
                            <option value="matutino">Matutino</option>
                            <option value="vespertino">Vespertino</option>
                            <option value="noturno">Noturno</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="editFrota">Frota</label>
                        <input type="text" id="editFrota" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editMotorista">Motorista</label>
                        <input type="text" id="editMotorista" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editLider">Líder/Gestor</label>
                        <input type="text" id="editLider" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editLocalSaida">Local Saída</label>
                        <input type="text" id="editLocalSaida" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editHrsSaida">Hrs Saída</label>
                        <input type="time" id="editHrsSaida" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editDestino">Destino</label>
                        <input type="text" id="editDestino" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editHrsChegada">Hrs Chegada</label>
                        <input type="time" id="editHrsChegada" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editPesoBruto">Peso Bruto (kg)</label>
                        <input type="number" id="editPesoBruto" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editPesoLiquido">Peso Líquido (kg)</label>
                        <input type="number" id="editPesoLiquido" step="0.01" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="editInformacoes">Informações Adicionais</label>
                        <textarea id="editInformacoes" rows="3"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script-entregas.js"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
