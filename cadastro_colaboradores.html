<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<title>Cadastro de Colaboradores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script defer src="js/colaboradores.js"></script>
<script src="js/spa-utils.js"></script>

<style>
body { 
  background: #f4f6f9;
}
.container {
  max-width: 1200px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-people"></i> Campo 4.0 - Cadastro de Colaboradores</h3>

    <button class="btn btn-light" onclick="sair()">
      <i class="bi bi-box-arrow-left"></i> Sair
    </button>
  </div>

  <!-- FORM -->
  <div id="formTela" class="card p-4 mb-4">

    <h5><i class="bi bi-pencil-square"></i> Registrar Colaborador</h5>

    <form id="formColaborador">

      <div class="row g-3" id="formCampos">

        <div class="col-md-2">
        <label class="form-label">Matrícula</label>
        <input type="text" id="matricula" class="form-control" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control" required>
      </div>

      <div class="col-md-2">
        <label class="form-label">Apelido</label>
        <input type="text" id="apelido" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">CPF</label>
        <input type="text" id="cpf" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">RG</label>
        <input type="text" id="rg" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">CNH</label>
        <input type="text" id="cnh" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Categoria CNH</label>
        <input type="text" id="categoria_cnh" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Telefone</label>
        <input type="text" id="telefone" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Função</label>
        <input type="text" id="funcao" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Turno</label>
        <input type="text" id="turno" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Data Admissão</label>
        <input type="date" id="data_admissao" class="form-control">
      </div>

      <div class="col-md-12">
        <label class="form-label">Observação</label>
        <input type="text" id="observacao" class="form-control">

      </div>

      <!-- BOTÕES -->
      <div class="mt-3 text-end">

        <button type="submit" class="btn btn-success" onclick="salvar()">
          <i class="bi bi-save"></i> Salvar
        </button>

        <button type="reset" class="btn btn-secondary" onclick="limparFormulario()">
          Cancelar
        </button>

        <button type="button" class="btn btn-primary" onclick="mostrarTabela()">
          Registros
        </button>

      </div>

    </form>

  </div>

  <!-- TABELA -->
  <div id="tabelaCard" class="card p-4 hidden">

    <!-- FILTROS -->
    <div id="filtros" class="row g-2 mb-3">

      <div class="col-md-3">
        <label class="form-label">Nome</label>
        <input type="text" id="filtroNome" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Função</label>
        <input type="text" id="filtroFuncao" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Turno</label>
        <input type="text" id="filtroTurno" class="form-control">
      </div>

      <div class="col-md-5 text-end">
        <button class="btn btn-primary" onclick="carregar()">Buscar</button>
        <button class="btn btn-secondary" onclick="limparFiltros()">Limpar</button>
        <button class="btn btn-dark" onclick="voltarFormulario()">Fechar</button>
      </div>

    </div>

    <!-- TABELA -->
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Matrícula</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Função</th>
          <th>Turno</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaDados"></tbody>
    </table>

  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
  /* Responsividade Mobile */
  @media (max-width: 768px) {
    body {
      padding: 0.75rem;
    }

    .container {
      padding: 0;
    }

    .card {
      border-radius: 10px;
      margin-bottom: 1rem !important;
    }

    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1.5rem !important;
    }

    .header h3 {
      font-size: 1.25rem;
      margin: 0;
      width: 100%;
    }

    .header .btn {
      align-self: flex-end;
      width: auto;
    }

    .card.p-4 {
      padding: 1rem !important;
    }

    h5 {
      font-size: 1.1rem;
      margin-bottom: 1rem !important;
    }

    .row.g-3 {
      margin-bottom: 1rem;
    }

    .row.g-3 > [class*="col-"] {
      padding-left: 0;
      padding-right: 0;
    }

    .col-md-2, 
    .col-md-3, 
    .col-md-5,
    .col-md-12 {
      flex: 0 0 100%;
      max-width: 100% !important;
    }

    .form-control {
      font-size: 16px;
      padding: 0.6rem 0.75rem;
      width: 100%;
    }

    .text-end {
      text-align: left !important;
      display: flex !important;
      flex-direction: column;
      gap: 0.5rem;
    }

    .mt-3 {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem !important;
    }

    .btn {
      width: 100%;
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
    }

    .table {
      font-size: 0.85rem;
      margin-bottom: 0;
    }

    .table th, 
    .table td {
      padding: 0.5rem;
    }

    .table thead th {
      font-size: 0.8rem;
      padding: 0.6rem 0.4rem;
    }

    #filtros {
      gap: 0.75rem;
      margin-bottom: 1rem !important;
    }

    #filtros .col-md-2,
    #filtros .col-md-3,
    #filtros .col-md-5 {
      flex: 0 0 100%;
      max-width: 100%;
    }

    #filtros .col-md-5 {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #filtros .btn {
      width: 100%;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
    }

    .table thead {
      background-color: #f8f9fa;
    }
  }

  @media (max-width: 576px) {
    .header h3 {
      font-size: 1.1rem;
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.4rem 0.6rem;
    }

    .table {
      font-size: 0.75rem;
    }

    .table th,
    .table td {
      padding: 0.4rem;
    }
  }

  .hidden {
    display: none !important;
  }
</style>

<script>
  // Funções de controle de formulário
  function mostrarTabela() {
    document.getElementById('formTela').classList.add('hidden');
    document.getElementById('tabelaCard').classList.remove('hidden');
    carregar();
  }

  function voltarFormulario() {
    document.getElementById('tabelaCard').classList.add('hidden');
    document.getElementById('formTela').classList.remove('hidden');
    limparFormulario();
  }

  function limparFiltros() {
    document.getElementById('filtroNome').value = '';
    document.getElementById('filtroFuncao').value = '';
    document.getElementById('filtroTurno').value = '';
    carregar();
  }

  function limparFormulario() {
    document.getElementById('formColaborador').reset();
  }

  function carregar() {
    // será preenchido pelo arquivo colaboradores.js
  }

  function salvar() {
    // será preenchido pelo arquivo colaboradores.js
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js', { scope: './' })
        .catch(err => console.warn('SW registration falhou:', err));
    });
  }
</script>

</body>
</html>
