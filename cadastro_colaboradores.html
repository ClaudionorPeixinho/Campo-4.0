<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Colaboradores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script defer src="js/colaboradores.js"></script>

<style>
body { background:#f4f6f9; }
.navbar-custom { background:#1f7a3e; }
.navbar-custom .navbar-brand,
.navbar-custom .nav-link { color:white !important; }
.card-custom { border-left:5px solid #1f7a3e; }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-3">
<span class="navbar-brand">🌾 Campo 4.0 - Cadastro de Colaboradores</span>
<div class="ms-auto">
<a href="index_menu.html" class="nav-link">Sair</a>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow card-custom">
<div class="card-body">

<h4 class="mb-4">Dados do Colaborador</h4>

<form id="formColaborador">

<div class="row mb-3">
<div class="col-md-4">
<label>Matrícula</label>
<input type="text" id="matricula" class="form-control" required>
</div>
<div class="col-md-4">
<label>Nome</label>
<input type="text" id="nome" class="form-control" required>
</div>
<div class="col-md-4">
<label>Apelido</label>
<input type="text" id="apelido" class="form-control">
</div>
</div>

<div class="row mb-3">
<div class="col-md-4">
<label>CPF</label>
<input type="text" id="cpf" class="form-control">
</div>
<div class="col-md-4">
<label>RG</label>
<input type="text" id="rg" class="form-control">
</div>
<div class="col-md-4">
<label>CNH</label>
<input type="text" id="cnh" class="form-control">
</div>
</div>

<div class="row mb-3">
<div class="col-md-4">
<label>Categoria CNH</label>
<input type="text" id="categoria_cnh" class="form-control">
</div>
<div class="col-md-4">
<label>Telefone</label>
<input type="text" id="telefone" class="form-control">
</div>
<div class="col-md-4">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>
</div>

<div class="row mb-3">
<div class="col-md-4">
<label>Função</label>
<input type="text" id="funcao" class="form-control">
</div>
<div class="col-md-4">
<label>Turno</label>
<input type="text" id="turno" class="form-control">
</div>
<div class="col-md-4">
<label>Data Admissão</label>
<input type="date" id="data_admissao" class="form-control">
</div>
</div>

<div class="mb-3">
<label>Observação</label>
<textarea id="observacao" class="form-control"></textarea>
</div>

<div class="mt-3">
<button type="submit" class="btn btn-success">Salvar</button>
<button type="reset" class="btn btn-secondary">Cancelar</button>
<button type="button" id="btnToggle" class="btn btn-dark">Mostrar Registros</button>
</div>

</form>
</div>
</div>

<!-- TABELA -->
<div class="card mt-4 shadow" id="tabelaCard" style="display:none;">
<div class="card-body">

<h5>Colaboradores Cadastrados</h5>

<div class="row mb-3">
<div class="col-md-4">
<input type="text" id="filtroNome" class="form-control" placeholder="Filtrar por nome">
</div>
<div class="col-md-4">
<input type="text" id="filtroFuncao" class="form-control" placeholder="Filtrar por função">
</div>
<div class="col-md-4">
<input type="text" id="filtroTurno" class="form-control" placeholder="Filtrar por turno">
</div>
</div>

<table class="table table-striped">
<thead class="table-success">
<tr>
<th>Matrícula</th>
<th>Nome</th>
<th>CPF</th>
<th>Função</th>
<th>Turno</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaDados"></tbody>
</table>

</div>
</div>

</div>
</body>
</html>
