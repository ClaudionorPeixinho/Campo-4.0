<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<title>Cadastro de Colaboradores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/StyleApto.css">
<script src="js/spa-utils.js"></script>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-custom px-3">
<span class="navbar-brand">
<div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-people-fill"></i>  Campo 4.0 - Cadastro de Colaboradores</h3>
</div>
</span>

<a class="nav-link text-white" href="javascript:void(0)" onclick="sair()">
<i class="bi bi-box-arrow-left"></i> Sair
</a>
</nav>

<div class="container mt-4">

<!-- FORM -->
<div id="formTela" class="card shadow card-custom">
<div class="card-body">

<h6 class="mb-3 text-success">
<i class="bi bi-person-plus"></i> Dados do Colaborador
</h6>

<form id="formColaborador">

<div class="row g-2" id="formCampos">

<div class="col-md-2 col-6">
<label>Matrícula</label>
<input type="text" id="matricula" class="form-control" required>
</div>

<div class="col-md-3 col-6">
<label>Nome</label>
<input type="text" id="nome" class="form-control" required>
</div>

<div class="col-md-3 col-6">
<label>Apelido</label>
<input type="text" id="apelido" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>CPF</label>
<input type="text" id="cpf" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>RG</label>
<input type="text" id="rg" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>CNH</label>
<input type="text" id="cnh" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Categoria CNH</label>
<input type="text" id="categoria_cnh" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Telefone</label>
<input type="text" id="telefone" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Função</label>
<input type="text" id="funcao" class="form-control">
</div>

<div class="col-md-2 col-6">
<label>Turno</label>
<select id="turno" class="form-select">
<option value="">Selecione</option>
<option>Diurno</option>
<option>Noturno</option>
</select>
</div>

<div class="col-md-2 col-6">
<label>Data Admissão</label>
<input type="date" id="data_admissao" class="form-control">
</div>

<div class="col-md-12">
<label>Observação</label>
<textarea id="observacao" class="form-control"></textarea>
</div>

</div>

<!-- BOTÕES PADRÃO -->
<div class="mt-3 text-end">

<button type="submit" class="btn btn-success">
<i class="bi bi-save"></i> Salvar
</button>

<button type="button" class="btn btn-secondary" onclick="limparFormulario()">
Cancelar
</button>

<button type="button" id="btnToggle" class="btn btn-primary">
<i class="bi bi-table"></i> Registros
</button>

</div>

</form>
</div>
</div>

<!-- TABELA -->
<div id="tabelaTela" class="mt-4" style="display:none;">

<!-- FILTROS -->
<div id="filtrosColaboradoresContainer" class="mb-2">
  <div class="filter-header" onclick="toggleFiltrosColaboradores()">
    <i class="bi bi-funnel filter-icon"></i>
    <span>Filtros de Pesquisa</span>
    <i class="bi bi-chevron-down toggle-icon"></i>
  </div>

  <div id="filtrosColaboradoresContent" class="filter-content">
    <div class="row g-2 p-2">
      <div class="col-md-3 col-12">
        <input id="filtroNome" placeholder="Filtrar por nome" class="form-control">
      </div>

      <div class="col-md-3 col-12">
        <input id="filtroFuncao" placeholder="Filtrar por função" class="form-control">
      </div>

      <div class="col-md-3 col-12">
        <select id="filtroTurno" class="form-control">
          <option value="">Todos</option>
          <option>Diurno</option>
          <option>Noturno</option>
        </select>
      </div>

      <div class="col-md-3 text-end">
        <button type="button" class="btn btn-primary" id="btnBuscarTabela">
          <i class="bi bi-search"></i> Buscar
        </button>
        <button type="button" class="btn btn-secondary" id="btnLimparFiltros">
          <i class="bi bi-eraser"></i> Limpar
        </button>
        <button type="button" class="btn btn-dark" id="btnFecharTabela">
          <i class="bi bi-x-lg"></i> Fechar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TABELA -->
<div class="card p-2 table-responsive">
<table class="table table-striped table-sm">
<thead>
<tr>
<th>Matrícula</th>
<th>Nome</th>
<th>CPF</th>
<th>Função</th>
<th>Turno</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaDados"></tbody>
</table>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/offline-sync.js"></script>
<script defer src="js/colaboradores.js"></script>

<script>
// Toggle filtros colapsáveis
function toggleFiltrosColaboradores() {
    const header = document.querySelector("#tabelaTela .filter-header");
    const content = document.getElementById("filtrosColaboradoresContent");
    if (header && content) {
        header.classList.toggle("collapsed");
        content.classList.toggle("collapsed");
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
