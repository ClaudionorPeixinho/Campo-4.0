<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Campo 4.0</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/offline-sync.js"></script>
<script src="js/pwa-installer.js"></script>

<style>
body{
    margin: 0;
    padding: 0;
    height: 100vh;

    background-image: url("Img/login 2.jpg");
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover; /* FAZ A IMAGEM OCUPAR TODA A TELA */
    background-attachment: fixed;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Segoe UI', sans-serif;
}
.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:100%;
    max-width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.btn-primary{
    background:#219963;
    border:none;
}

.offline-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    background: #d63333;
    color: white;
    font-weight: 600;
    text-align: center;
    z-index: 9999;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
}

.offline-banner.visible {
    transform: translateY(0);
}

.offline-banner button {
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 0.55rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
}
</style>
</head>

<body>

    <div class="offline-banner" id="offlineBanner">
        Você está offline. Alguns recursos podem não funcionar.
        <button type="button" id="retryConnection">Tentar novamente</button>
    </div>

<div class="login-box">
    <h4 class="text-center mb-4">🌿 Campo 4.0</h4>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password" id="senha" class="form-control">
    </div>

    <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
    <button class="btn btn-outline-secondary w-100" onclick="registrar()">Registrar</button>

    <div id="mensagem" class="mt-3 text-danger text-center"></div>
</div>

<script>
// Redireciona se já logado
async function checkSession() {
    const client = window.supabaseClient;
    if (!client) return;
    try {
        const { data: { session } } = await client.auth.getSession();
        if (session) {
            window.location.href = "index_menu.html";
        }
    } catch(e) {}
}

// Aguarda Supabase carregar
function waitForSupabase(callback, retries = 20) {
    if (window.supabaseClient) {
        callback(window.supabaseClient);
    } else if (retries > 0) {
        setTimeout(() => waitForSupabase(callback, retries - 1), 200);
    } else {
        document.getElementById("mensagem").innerText = "Erro ao carregar. Recarregue a página.";
    }
}

document.addEventListener("DOMContentLoaded", () => {
    waitForSupabase((client) => {
        checkSession();
    });
});

async function registrar() {
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const msg = document.getElementById("mensagem");
    msg.innerText = "";

    if (!email || !senha) {
        msg.innerText = "Preencha email e senha.";
        return;
    }

    try {
        const { data, error } = await window.supabaseClient.auth.signUp({
            email: email,
            password: senha
        });

        if (error) {
            msg.innerText = error.message;
            return;
        }

        await window.supabaseClient.from("usuarios").insert([{
            id: data.user.id,
            email: email,
            nome: email,
            nivel: "funcionario"
        }]);

        msg.className = "mt-3 text-success text-center";
        msg.innerText = "Registrado! Verifique seu email.";
    } catch(e) {
        msg.innerText = "Erro: " + e.message;
    }
}

async function login() {
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const msg = document.getElementById("mensagem");
    const btn = document.querySelector('.btn-primary');
    
    msg.innerText = "";

    if (!email || !senha) {
        msg.innerText = "Preencha email e senha.";
        return;
    }

    if (!window.supabaseClient) {
        msg.innerText = "Sistema carregando... Tente novamente.";
        setTimeout(() => waitForSupabase(() => {}), 500);
        return;
    }

    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Entrando...';
    }

    try {
        const { error } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: senha
        });

        if (error) {
            msg.innerText = error.message;
            if (btn) { btn.disabled = false; btn.innerHTML = 'Entrar'; }
        } else {
            window.location.href = "index_menu.html";
        }
    } catch(e) {
        msg.innerText = "Erro: " + e.message;
        if (btn) { btn.disabled = false; btn.innerHTML = 'Entrar'; }
    }
}

function updateOfflineBanner() {
    const banner = document.getElementById('offlineBanner');
    if (!banner) return;
    if (!navigator.onLine) {
        banner.classList.add('visible');
    } else {
        banner.classList.remove('visible');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    updateOfflineBanner();
    const retryButton = document.getElementById('retryConnection');
    if (retryButton) {
        retryButton.addEventListener('click', () => {
            updateOfflineBanner();
            if (navigator.onLine) {
                window.location.reload();
            }
        });
    }
});

window.addEventListener('online', updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>

</body>
</html>
