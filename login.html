<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Campo 4.0</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
    background:linear-gradient(135deg,#1e2a2f,#219963);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    border-radius:15px;
    padding:30px;
    width:100%;
    max-width:400px;
}
</style>
</head>

<body>

<div class="card shadow">
<h4 class="text-center mb-4">🌿 Campo 4.0</h4>

<input type="email" id="email" class="form-control mb-3" placeholder="Email">
<input type="password" id="senha" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-success w-100" onclick="login()">Entrar</button>

</div>

<script>
async function login(){
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password:senha
    });

    if(error){
        alert(error.message);
    }else{
        window.location.href="index_menu.html";
    }
}
</script>

</body>
</html>
