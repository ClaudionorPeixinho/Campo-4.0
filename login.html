<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Campo 4.0</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin: 0;
    padding: 0;
    height: 100vh;

    background-image: url("Img/login 2.jpg");
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover; /* FAZ A IMAGEM OCUPAR TODA A TELA */
    background-attachment: fixed;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Segoe UI', sans-serif;
}
.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:100%;
    max-width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.btn-primary{
    background:#219963;
    border:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h4 class="text-center mb-4">🌿 Campo 4.0</h4>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password" id="senha" class="form-control">
    </div>

    <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
    <button class="btn btn-outline-secondary w-100" onclick="registrar()">Registrar</button>

    <div id="mensagem" class="mt-3 text-danger text-center"></div>
</div>

<script>
const supabaseUrl = "https://szzfqkhibuejhodhkvjj.supabase.co";
const supabaseKey = "sb_publishable_hIEhtwoXoQKvu2SkQYr4Tg_7HuC1-G_";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// Se já estiver logado, vai direto para menu
document.addEventListener("DOMContentLoaded", async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(session){
        window.location.href = "index_menu.html";
    }
});

async function registrar(){
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const msg = document.getElementById("mensagem");

    msg.innerText = "";

    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: senha
    });

    if(error){
        msg.innerText = error.message;
        return;
    }

    // cria registro na tabela usuarios
    await supabaseClient.from("usuarios").insert({
        id: data.user.id,
        email: email,
        nome: email,
        nivel: "funcionario"
    });

    msg.classList.remove("text-danger");
    msg.classList.add("text-success");
    msg.innerText = "Registrado com sucesso!";
}

async function login(){
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const msg = document.getElementById("mensagem");

    msg.innerText = "";

    const { error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: senha
    });

    if(error){
        msg.innerText = error.message;
    }else{
        window.location.href = "index_menu.html";
    }
}
</script>

</body>
</html>
