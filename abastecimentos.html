<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<meta charset="UTF-8">
<title>Controle de Abastecimento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/style_Abast.css">
<script src="js/spa-utils.js"></script>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-fuel-pump"></i>  Campo 4.0 -  Controle de Abastecimentos</h3>

    <button class="btn btn-light" onclick="sair()">
      <i class="bi bi-box-arrow-left"></i> Sair
    </button>
  </div>

  <!-- FORM -->
  <div id="formTela" class="card p-4 mb-4">

    <h5><i class="bi bi-pencil-square"></i> Registrar Abastecimento</h5>

    <div class="row g-3" id="formCampos">

      <div class="col-md-3">
        <label class="form-label">Equipamento</label>
        <input type="text" id="equipamento" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Operador</label>
        <input type="text" id="operador" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Local</label>
        <input type="text" id="local" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Abastecedor</label>
        <input type="text" id="abastecedor" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">Combustível</label>
        <select id="combustivel" class="form-control">
          <option>Diesel</option>
          <option>Gasolina</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label">Quantidade</label>
        <input type="number" id="quantidade" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Data/Hora</label>
        <input type="datetime-local" id="data" class="form-control">
      </div>

      <div class="col-md-2">
        <label class="form-label">KM/Horímetro</label>
        <input type="number" id="horimetro" class="form-control">
      </div>

      <div class="col-md-12">
        <label class="form-label">Observações</label>
        <input type="text" id="obs" class="form-control">
      </div>

    </div>

    <!-- BOTÕES -->
    <div class="mt-3 text-end">

      <button class="btn btn-success" onclick="salvar()">
        <i class="bi bi-save"></i> Salvar
      </button>

      <button class="btn btn-secondary" onclick="limparFormulario()">
        Cancelar
      </button>

      <button class="btn btn-primary" onclick="mostrarTabela()">
        Registros
      </button>

    </div>

  </div>

  <!-- TABELA -->
  <div id="tabelaBox" class="card p-4 hidden">

    <!-- FILTROS -->
    <div id="filtrosAbastecimentoContainer" class="mb-3">
      <div class="filter-header" onclick="toggleFiltrosAbastecimento()">
        <i class="bi bi-funnel filter-icon"></i>
        <span>Filtros de Pesquisa</span>
        <i class="bi bi-chevron-down toggle-icon"></i>
      </div>

      <div id="filtrosAbastecimentoContent" class="filter-content">
        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Equipamento</label>
            <input type="text" id="filtroEquipamento" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Operador</label>
            <input type="text" id="filtroOperador" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Combustível</label>
            <select id="filtroCombustivel" class="form-control">
              <option value="">Todos</option>
              <option>Diesel</option>
              <option>Gasolina</option>
            </select>
          </div>

          <div class="col-md-3 text-end">
            <button class="btn btn-primary" onclick="carregar()">Buscar</button>
            <button class="btn btn-secondary" onclick="limparFiltros()">Limpar</button>
            <button class="btn btn-dark" onclick="voltarFormulario()">Fechar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TABELA -->
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Equipamento</th>
          <th>Operador</th>
          <th>Combustível</th>
          <th>Qtd</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/offline-sync.js"></script>
<script src="js/app.js"></script>

<script>
// Toggle filtros colapsáveis
function toggleFiltrosAbastecimento() {
    const header = document.querySelector("#filtrosAbastecimentoContainer .filter-header");
    const content = document.getElementById("filtrosAbastecimentoContent");
    if (header && content) {
        header.classList.toggle("collapsed");
        content.classList.toggle("collapsed");
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
