<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apontamento Entrega Cana</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/supabase.js"></script>
<script defer src="js/apontamento.js"></script>

<style>
body { background:#f4f6f9; }
.navbar-custom { background:#1f7a3e; }
.navbar-custom .navbar-brand { color:white; font-weight:600; }

.card-custom {
    border-radius:12px;
    border-left:5px solid #1f7a3e;
}

.form-control, .form-select {
    height:40px;
    font-size:12px;
}

.btn-custom {
    border-radius:6px;
    font-size:12px;
    padding:4px 8px;
}

.table th, .table td {
    font-size:12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-custom px-3">
<span class="navbar-brand">
<i class="bi bi-truck"></i> Campo 4.0 - Apontamento de Cargas</span>
<a class="nav-link" href="index_menu.html"><i class="bi bi-box-arrow-right"></i> Sair</a>
</nav>

<div class="container mt-4">
<div class="card shadow card-custom">
<div class="card-body">

<h6 class="mb-3 text-success">
<i class="bi bi-clipboard-data"></i> Lançamento
</h6>

<form id="formApontamento">
<div class="row g-2">

<div class="col-md-2">
<label>Data</label>
<input type="date" id="data_lancamento" class="form-control" required>
</div>

<div class="col-md-2">
<label>Turno</label>
<select id="turno" class="form-select" required>
<option value="">Selecione</option>
<option>Diurno</option>
<option>Noturno</option>
</select>
</div>

<div class="col-md-2">
<label>Frota</label>
<input type="text" id="frota" class="form-control" required>
</div>

<div class="col-md-3">
<label>Motorista</label>
<input type="text" id="motorista" class="form-control" required>
</div>

<div class="col-md-3">
<label>Líder/Gestor</label>
<input type="text" id="lider_gestor" class="form-control" required>
</div>

<div class="col-md-3">
<label>Local Saída</label>
<input type="text" id="saida" class="form-control" required>
</div>

<div class="col-md-2">
<label>Hrs Saída</label>
<input type="time" id="hora_saida" class="form-control" required>
</div>

<div class="col-md-3">
<label>Destino</label>
<input type="text" id="destino" class="form-control" required>
</div>

<div class="col-md-2">
<label>Hrs Chegada</label>
<input type="time" id="hora_chegada" class="form-control" required>
</div>

<div class="col-md-2">
<label>Peso Líquido</label>
<input type="number" step="0.01" id="peso_liquido" class="form-control" required>
</div>

<div class="col-md-2">
<label>Peso Bruto</label>
<input type="number" step="0.01" id="peso_bruto" class="form-control" required>
</div>

<div class="col-md-10">
<label>Informações Adicionais</label>
<input type="text" id="informacoes_adicionais" class="form-control">
</div>

</div>

<hr class="my-3">

<div class="d-flex gap-2 flex-wrap">

<button type="submit" class="btn btn-success btn-custom">
<i class="bi bi-save"></i> Salvar
</button>

<button type="button" id="btnMostrar" class="btn btn-primary btn-custom">
<i class="bi bi-table"></i> Mostrar Registros
</button>

</div>

</form>

<div id="areaTabela" class="mt-4" style="display:none;">
<div id="tabelaContainer"></div>
</div>

</div>
</div>
</div>

</body>
</html>
