<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Abastecimentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/abastecimento.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container mt-4">

    <div class="card shadow-lg p-4">

        <h3 class="text-center titulo">Controle de Abastecimentos</h3>

        <form id="formAbastecimento">

            <div class="row g-3">

                <div class="col-md-3">
                    <label>Data</label>
                    <input type="date" class="form-control campo-enter" id="data">
                </div>

                <div class="col-md-2">
                    <label>Hora</label>
                    <input type="time" class="form-control campo-enter" id="hora">
                </div>

                <div class="col-md-3">
                    <label>Empresa</label>
                    <input type="text" class="form-control campo-enter" id="empresa">
                </div>

                <div class="col-md-4">
                    <label>Equipamento</label>
                    <input type="text" class="form-control campo-enter" id="equipamento">
                </div>

                <div class="col-md-3">
                    <label>Material</label>
                    <input type="text" class="form-control campo-enter" id="material">
                </div>

                <div class="col-md-3">
                    <label>Litros</label>
                    <input type="number" step="0.001" class="form-control campo-enter" id="litros">
                </div>

                <div class="col-md-3">
                    <label>Valor Unit.</label>
                    <input type="number" step="0.001" class="form-control campo-enter" id="valor_unitario">
                </div>

                <div class="col-md-3">
                    <label>Valor Total</label>
                    <input type="number" step="0.01" class="form-control" id="valor_total" readonly>
                </div>

            </div>

            <div class="mt-4 d-flex justify-content-between">

                <div>
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='index_menu.html'">Sair</button>
                </div>

            </div>

        </form>

    </div>

    <!-- FILTROS -->
    <div class="card mt-4 p-3 shadow">

        <div class="row g-3">
            <div class="col-md-3">
                <input type="date" class="form-control" id="filtroData">
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" placeholder="Equipamento" id="filtroEquip">
            </div>
            <div class="col-md-6 d-flex gap-2">
                <button class="btn btn-success" onclick="filtrar()">Pesquisar</button>
                <button class="btn btn-warning" onclick="limparFiltro()">Limpar</button>
                <button class="btn btn-dark" onclick="toggleTabela()">Ocultar/Mostrar</button>
            </div>
        </div>

    </div>

    <!-- TABELA -->
    <div class="card mt-4 p-3 shadow" id="containerTabela">

        <div class="table-responsive">
            <table class="table table-striped table-hover" id="tabela">
                <thead class="table-success">
                    <tr>
                        <th>Data</th>
                        <th>Equipamento</th>
                        <th>Material</th>
                        <th>Litros</th>
                        <th>Valor Total</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>

</div>

<script src="js/abastecimento.js"></script>
</body>
</html>
