<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<meta charset="UTF-8">
<title>Ponto Digital</title>
<link rel="stylesheet" href="css/style_Ponto.css">
</head>

<body>

<div class="topo">
    <h1>🌿 Campo 4.0 - A Tecnologia no alcance da sua mão!</h1>

    <a href="index_menu.html" class="btn-sair">
        <i class="bi bi-box-arrow-left"></i> Sair
    </a>
</div>

<div class="container-form">

    <div class="titulo">
        ⏱️ PONTO DIGITAL
    </div>

    <form id="formPonto">

        <div class="form-grid">

            <!-- Linha 1 -->
            <div class="form-group">
                <label>Data Lançamento</label>
                <input type="date" name="data_lancamento" required>
            </div>

            <div class="form-group">
                <label>Hora Inicial Jornada</label>
                <input type="time" name="hi_jornada" required>
            </div>

            <div class="form-group">
                <label>Hora Final Jornada</label>
                <input type="time" name="hf_jornada" required>
            </div>

            <!-- Linha 2 -->
            <div class="form-group">
                <label>Nome Colaborador</label>
                <input type="text" name="colaborador" required>
            </div>

            <div class="form-group">
                <label>Matrícula</label>
                <input type="text" name="matricula">
            </div>

            <div class="form-group">
                <label>Função</label>
                <input type="text" name="funcao">
            </div>

            <!-- Linha 3 -->
            <div class="form-group">
                <label>Nº Frota</label>
                <input type="text" name="frota">
            </div>

            <div class="form-group">
                <label>Km Inicial</label>
                <input type="number" name="kmi">
            </div>

            <div class="form-group">
                <label>Km Final</label>
                <input type="number" name="kmf">
            </div>

            <!-- Linha 4 -->
            <div class="form-group">
                <label>Fazenda / Lote</label>
                <input type="text" name="fazenda_lote">
            </div>

            <div class="form-group">
                <label>Turno</label>
                <input type="text" name="turno">
            </div>

            <div class="form-group">
                <label>Líder da Frente</label>
                <input type="text" name="lider">
            </div>

            <!-- Linha 5 -->
            <div class="form-group full">
                <label>Informações Adicionais</label>
                <textarea name="informacao" rows="3"></textarea>
            </div>

        </div>

        <div class="botoes">
            <button type="submit" class="btn-registrar">Registrar</button>
            <button type="reset" class="btn-cancelar">Cancelar</button>
        </div>

    </form>

    <!-- ============================= -->
    <!-- TABELA FORA DO MODAL (CORRETO) -->
    <!-- ============================= -->

    <hr style="margin:40px 0;">

    <div class="lista-registros">
        <h2>📋 Registros Lançados</h2>
        <table id="tabelaRegistros">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Colaborador</th>
                    <th>Frota</th>
                    <th>KM Inicial</th>
                    <th>KM Final</th>
                    <th>KM Rodado</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- ============================= -->
<!-- MODAL (SOMENTE MODAL) -->
<!-- ============================= -->

<div id="modalConfirm" class="modal">
  <div class="modal-content">
      <h3>Confirmar Registro</h3>
      <p>Deseja salvar esse registro?</p>
      <div class="modal-buttons">
          <button id="btnConfirmSim" class="btn-registrar">Sim</button>
          <button id="btnConfirmNao" class="btn-cancelar">Não</button>
      </div>
  </div>
</div>

<!-- Loader -->
<div id="loader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<!-- Scripts no final -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script defer src="js/pontodigital.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
