<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto Digital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="js/spa-utils.js"></script>

<style>
  body { 
    background: #f4f6f9;
  }
  .container {
    max-width: 1200px;
  }

  /* Responsividade Mobile */
  @media (max-width: 768px) {
    body {
      padding: 0.75rem;
    }

    .container {
      padding: 0;
    }

    .card {
      border-radius: 10px;
      margin-bottom: 1rem !important;
    }

    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1.5rem !important;
    }

    .header h3 {
      font-size: 1.25rem;
      margin: 0;
      width: 100%;
    }

    .header .btn {
      align-self: stretch;
      width: 100%;
    }

    .card.p-4 {
      padding: 1rem !important;
    }

    h5 {
      font-size: 1.1rem;
      margin-bottom: 1rem !important;
    }

    .row.g-3 {
      margin-bottom: 1rem;
    }

    .row.g-3 > [class*="col-"] {
      padding-left: 0;
      padding-right: 0;
    }

    .col-md-2,
    .col-md-3,
    .col-md-12 {
      flex: 0 0 100%;
      max-width: 100% !important;
    }

    .form-label {
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }

    .form-control,
    .form-select {
      font-size: 16px;
      padding: 0.6rem 0.75rem;
      width: 100%;
    }

    .text-end {
      text-align: left !important;
      display: flex !important;
      flex-direction: column;
      gap: 0.5rem;
    }

    .mt-3 {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem !important;
    }

    .btn {
      width: 100%;
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
    }

    .table {
      font-size: 0.85rem;
      margin-bottom: 0;
    }

    .table th,
    .table td {
      padding: 0.5rem;
    }

    .table thead th {
      font-size: 0.8rem;
      padding: 0.6rem 0.4rem;
    }

    .table thead {
      background-color: #f8f9fa;
    }
  }

  @media (max-width: 576px) {
    .header h3 {
      font-size: 1.1rem;
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.4rem 0.6rem;
    }

    .table {
      font-size: 0.75rem;
    }

    .table th,
    .table td {
      padding: 0.4rem;
    }
  }

  /* Filter collapsible styles */
  .filter-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 15px;
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 0.75rem;
    transition: background 0.3s ease;
  }

  .filter-header:hover {
    background: #e9ecef;
  }

  .filter-header i.filter-icon {
    color: #219963;
  }

  .filter-header span {
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .filter-header i.toggle-icon {
    transition: transform 0.3s ease;
    color: #219963;
  }

  .filter-header.collapsed i.toggle-icon {
    transform: rotate(-90deg);
  }

  .filter-content {
    max-height: 500px;
    opacity: 1;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
    padding: 0.5rem 0;
  }

  .filter-content.collapsed {
    max-height: 0;
    opacity: 0;
    padding: 0;
  }

  @media (max-width: 768px) {
    .filter-content {
      flex-direction: column;
    }

    .filter-content .col-md-3,
    .filter-content .col-md-2,
    .filter-content .col-md-4 {
      flex: 0 0 100%;
      max-width: 100%;
    }

    .filter-content .btn {
      width: 100%;
      margin-bottom: 0.5rem;
    }

    .filter-content .text-end {
      flex-direction: column;
    }
  }

  .hidden {
    display: none !important;
  }
</style>

</head>

<body class="p-4">

<div class="container">

  <!-- HEADER -->
  <div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-clock-fill"></i> Campo 4.0 - Ponto Digital</h3>

    <button class="btn btn-light" onclick="sair()">
      <i class="bi bi-box-arrow-left"></i> Sair
    </button>
  </div>

  <!-- FORM -->
  <div id="formTela" class="card p-4 mb-4">

    <h5><i class="bi bi-pencil-square"></i> Registrar Ponto</h5>

    <form id="formPonto">

      <div class="row g-3" id="formCampos">

        <div class="col-md-2">
          <label class="form-label">Data Lançamento</label>
          <input type="date" id="data_lancamento" name="data_lancamento" class="form-control" required>
        </div>

        <div class="col-md-2">
          <label class="form-label">Hora Inicial</label>
          <input type="time" id="hi_jornada" name="hi_jornada" class="form-control" required>
        </div>

        <div class="col-md-2">
          <label class="form-label">Hora Final</label>
          <input type="time" id="hf_jornada" name="hf_jornada" class="form-control" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">Colaborador</label>
          <input type="text" id="colaborador" name="colaborador" class="form-control" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">Matrícula</label>
          <input type="text" id="matricula" name="matricula" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Função</label>
          <input type="text" id="funcao" name="funcao" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Nº Frota</label>
          <input type="text" id="frota" name="frota" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">KM Inicial</label>
          <input type="number" id="kmi" name="kmi" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">KM Final</label>
          <input type="number" id="kmf" name="kmf" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Fazenda/Lote</label>
          <input type="text" id="fazenda_lote" name="fazenda_lote" class="form-control">
        </div>

        <div class="col-md-2">
          <label class="form-label">Turno</label>
          <input type="text" id="turno" name="turno" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label">Líder da Frente</label>
          <input type="text" id="lider" name="lider" class="form-control">
        </div>

        <div class="col-md-12">
          <label class="form-label">Informações Adicionais</label>
          <textarea id="informacao" name="informacao" class="form-control" rows="2"></textarea>
        </div>

      </div>

      <!-- BOTÕES -->
      <div class="mt-3 text-end">

        <button type="submit" class="btn btn-success">
          <i class="bi bi-save"></i> Salvar
        </button>

        <button type="reset" class="btn btn-secondary" onclick="limparFormulario()">
          Cancelar
        </button>

        <button type="button" class="btn btn-primary" onclick="mostrarTabela()">
          Registros
        </button>

      </div>

    </form>

  </div>

  <!-- TABELA -->
  <div id="tabelaCard" class="card p-4 hidden">

    <!-- FILTROS -->
    <div id="filtrosContainer" class="mb-3">
      <div class="filter-header" onclick="toggleFiltrosPonto()">
        <i class="bi bi-funnel filter-icon"></i>
        <span>Filtros de Pesquisa</span>
        <i class="bi bi-chevron-down toggle-icon"></i>
      </div>

      <div id="filtrosContent" class="filter-content">
        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Colaborador</label>
            <input type="text" id="filtroColaborador" class="form-control">
          </div>

          <div class="col-md-2">
            <label class="form-label">Frota</label>
            <input type="text" id="filtroFrota" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Data</label>
            <input type="date" id="filtroData" class="form-control">
          </div>

          <div class="col-md-4 text-end">
            <button class="btn btn-primary" onclick="carregar()">Buscar</button>
            <button class="btn btn-secondary" onclick="limparFiltros()">Limpar</button>
            <button class="btn btn-dark" onclick="voltarFormulario()">Fechar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TABELA -->
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Data</th>
          <th>Colaborador</th>
          <th>Frota</th>
          <th>KM Inicial</th>
          <th>KM Final</th>
          <th>KM Rodado</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaDados"></tbody>
    </table>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/offline-sync.js"></script>

<script defer src="js/pontodigital.js"></script>

<script>
  // Toggle filtros colapsáveis
  function toggleFiltrosPonto() {
    const header = document.querySelector("#filtrosContainer .filter-header");
    const content = document.getElementById("filtrosContent");
    if (header && content) {
      header.classList.toggle("collapsed");
      content.classList.toggle("collapsed");
    }
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js', { scope: './' })
        .catch(err => console.warn('SW registration falhou:', err));
    });
  }
</script>

</body>
</html>
