<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
    <title>Gestão de Equipamentos Agrícolas</title>
    <link rel="stylesheet" href="css/style_Equip.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <header class="header">
            <h1><i class="fas fa-tractor"></i> Gestão de Equipamentos Agrícolas</h1>
            <div class="export-options">
                <select id="exportFormat" class="export-select">
                    <option value="pdf">PDF</option>
                    <option value="excel">Excel</option>
                    <option value="jpg">JPG</option>
                </select>
                <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Exportar</button>
            </div>
        </header>

        <!-- Formulário de Cadastro -->
        <section class="form-section">
            <h2><i class="fas fa-plus-circle"></i> Cadastrar Equipamento</h2>
            <form id="equipmentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome"><i class="fas fa-tag"></i> Nome do Equipamento*</label>
                        <input type="text" id="nome" name="nome" required placeholder="Ex: Trator Massey Ferguson">
                    </div>
                    
                    <div class="form-group">
                        <label for="tipo"><i class="fas fa-list"></i> Tipo*</label>
                        <select id="tipo" name="tipo" required>
                            <option value="">Selecione o tipo</option>
                            <option value="trator">Trator</option>
                            <option value="colheitadeira">Colheitadeira</option>
                            <option value="pulverizador">Pulverizador</option>
                            <option value="plantadeira">Plantadeira</option>
                            <option value="arado">Arado</option>
                            <option value="grade">Grade</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="marca"><i class="fas fa-building"></i> Marca</label>
                        <input type="text" id="marca" name="marca" placeholder="Ex: John Deere">
                    </div>
                    
                    <div class="form-group">
                        <label for="modelo"><i class="fas fa-cog"></i> Modelo</label>
                        <input type="text" id="modelo" name="modelo" placeholder="Ex: 5075E">
                    </div>
                    
                    <div class="form-group">
                        <label for="ano"><i class="fas fa-calendar"></i> Ano</label>
                        <input type="number" id="ano" name="ano" min="1990" max="2025" placeholder="2024">
                    </div>
                    
                    <div class="form-group">
                        <label for="status"><i class="fas fa-info-circle"></i> Status*</label>
                        <select id="status" name="status" required>
                            <option value="">Selecione o status</option>
                            <option value="operacional">Operacional</option>
                            <option value="manutencao">Em Manutenção</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="observacoes"><i class="fas fa-comment"></i> Observações</label>
                        <textarea id="observacoes" name="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Salvar Equipamento</button>
                    <button type="reset" class="btn-reset"><i class="fas fa-undo"></i> Limpar</button>
                </div>
            </form>
        </section>

        <!-- Filtros -->
        <section class="filters-section">
            <div class="filters-header" onclick="toggleFilters()">
                <h3><i class="fas fa-filter"></i> Filtros</h3>
                <i class="fas fa-chevron-down" id="filterIcon"></i>
            </div>
            <div class="filters-content" id="filtersContent">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="filterTipo">Tipo</label>
                        <select id="filterTipo">
                            <option value="">Todos</option>
                            <option value="trator">Trator</option>
                            <option value="colheitadeira">Colheitadeira</option>
                            <option value="pulverizador">Pulverizador</option>
                            <option value="plantadeira">Plantadeira</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterStatus">Status</label>
                        <select id="filterStatus">
                            <option value="">Todos</option>
                            <option value="operacional">Operacional</option>
                            <option value="manutencao">Em Manutenção</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterMarca">Marca</label>
                        <input type="text" id="filterMarca" placeholder="Filtrar por marca">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterData">Últimas 24h</label>
                        <input type="checkbox" id="filterData" checked>
                    </div>
                </div>
                <div class="filter-actions">
                    <button id="applyFilters" class="btn-filter"><i class="fas fa-search"></i> Aplicar Filtros</button>
                    <button id="clearFilters" class="btn-clear"><i class="fas fa-times"></i> Limpar</button>
                </div>
            </div>
        </section>

        <!-- Controles da Tabela -->
        <div class="table-controls">
            <button id="toggleTable" class="btn-toggle">
                <i class="fas fa-eye"></i> <span>Ocultar Planilha</span>
            </button>
            <span class="records-info"><i class="fas fa-clock"></i> Registros das últimas 24h</span>
        </div>

        <!-- Tabela de Equipamentos -->
        <section class="table-section" id="tableSection">
            <div class="table-responsive">
                <table id="equipmentTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Ano</th>
                            <th>Status</th>
                            <th>Observações</th>
                            <th>Registro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Dados serão inseridos via JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2><i class="fas fa-edit"></i> Editar Equipamento</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNome">Nome</label>
                    <input type="text" id="editNome" required>
                </div>
                <div class="form-group">
                    <label for="editTipo">Tipo</label>
                    <select id="editTipo" required>
                        <option value="trator">Trator</option>
                        <option value="colheitadeira">Colheitadeira</option>
                        <option value="pulverizador">Pulverizador</option>
                        <option value="plantadeira">Plantadeira</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editMarca">Marca</label>
                    <input type="text" id="editMarca">
                </div>
                <div class="form-group">
                    <label for="editModelo">Modelo</label>
                    <input type="text" id="editModelo">
                </div>
                <div class="form-group">
                    <label for="editAno">Ano</label>
                    <input type="number" id="editAno">
                </div>
                <div class="form-group">
                    <label for="editStatus">Status</label>
                    <select id="editStatus" required>
                        <option value="operacional">Operacional</option>
                        <option value="manutencao">Em Manutenção</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editObservacoes">Observações</label>
                    <textarea id="editObservacoes" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-submit">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/script.js"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
</body>
</html>
