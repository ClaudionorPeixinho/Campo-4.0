<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Campo 4.0 | Sistema Agro Inteligente</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/apexcharts/dist/apexcharts.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #2e7d32;
    --primary-dark: #1b5e20;
    --primary-light: #4caf50;
    --secondary-color: #ff9800;
    --accent-color: #2196f3;
    --danger-color: #f44336;
    --success-color: #4caf50;
    --warning-color: #ff9800;
    --dark-bg: #0a0f0c;
    --dark-surface: #141a14;
    --dark-card: #1e2a1f;
    --light-bg: #f5f7f5;
    --light-surface: #ffffff;
    --light-card: #ffffff;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    font-family: 'Inter', sans-serif;
    transition: var(--transition);
    overflow-x: hidden;
}

body.light {
    background: var(--light-bg);
    color: #1a2c1a;
}

body.dark {
    background: var(--dark-bg);
    color: #e8f0e8;
}

/* Scrollbar personalizada */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: var(--primary-color);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--primary-dark);
}

/* Sidebar Moderna - SEMPRE VISÍVEL */
.sidebar {
    position: fixed;
    width: 280px;
    height: 100vh;
    background: linear-gradient(135deg, #1a2a1a 0%, #0f1a0f 100%);
    backdrop-filter: blur(10px);
    color: white;
    padding: 0;
    transition: transform 0.3s ease;
    z-index: 1000;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
    overflow-y: auto;
    transform: translateX(0);
}

/* Mobile: Sidebar retrátil */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        width: 280px;
    }
    
    .sidebar.collapsed {
        transform: translateX(-100%);
    }
    
    .sidebar.open {
        transform: translateX(0);
        box-shadow: 2px 0 30px rgba(0, 0, 0, 0.3);
    }
}

.sidebar-header {
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 20px;
}

.sidebar-header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, #4caf50);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
}

.sidebar-header p {
    font-size: 0.8rem;
    opacity: 0.7;
    margin: 0;
}

.sidebar ul {
    list-style: none;
    padding: 0 15px;
}

.sidebar ul li {
    padding: 12px 18px;
    margin: 5px 0;
    cursor: pointer;
    border-radius: 12px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
    position: relative;
    overflow: hidden;
}

.sidebar ul li i {
    font-size: 1.3rem;
    width: 28px;
    transition: var(--transition);
}

.sidebar ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 3px;
    background: var(--secondary-color);
    transform: scaleY(0);
    transition: var(--transition);
}

.sidebar ul li:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
}

.sidebar ul li:hover::before {
    transform: scaleY(1);
}

.sidebar ul li.active {
    background: linear-gradient(90deg, rgba(76, 175, 80, 0.2), transparent);
    border-left: 3px solid var(--secondary-color);
}

/* Main Content */
.main {
    margin-left: 280px;
    padding: 20px 30px;
    min-height: 100vh;
    transition: var(--transition);
}

@media (max-width: 768px) {
    .main {
        margin-left: 0;
        padding: 15px;
    }
}

/* Topbar Moderno */
.topbar {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 15px 25px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    transition: var(--transition);
}

body.dark .topbar {
    background: rgba(30, 42, 31, 0.95);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.menu-toggle {
    display: none;
    cursor: pointer;
    font-size: 24px;
    transition: var(--transition);
    padding: 0;
    background: transparent;
    color: var(--primary-color);
    border: none;
    border-radius: 0;
    width: auto;
    height: auto;
    margin-right: 0;
}

.menu-toggle:hover {
    background: var(--primary-dark);
}

.menu-toggle:active {
    transform: scale(0.95);
}

/* Backdrop para fechar menu ao clicar */
.sidebar-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
    animation: fadeIn 0.3s ease;
}

.sidebar-backdrop.active {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

.page-title {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

.mode-toggle {
    cursor: pointer;
    font-size: 24px;
    transition: var(--transition);
    padding: 8px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.05);
}

.mode-toggle:hover {
    transform: rotate(15deg);
    background: rgba(0, 0, 0, 0.1);
}

.user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 15px;
    background: rgba(76, 175, 80, 0.1);
    border-radius: 50px;
    font-weight: 500;
}

.user-avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
}

/* Cards e conteúdo */
#conteudoPrincipal {
    animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.welcome-card {
    background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
    border-radius: 25px;
    padding: 40px;
    color: white;
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
}

.welcome-card::before {
    content: '🌾';
    position: absolute;
    right: -20px;
    bottom: -20px;
    font-size: 150px;
    opacity: 0.1;
}

@media (max-width: 768px) {
    .welcome-card::before {
        display: none;
    }
}

.welcome-card h2 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 10px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--light-surface);
    border-radius: 20px;
    padding: 25px;
    transition: var(--transition);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(0, 0, 0, 0.05);
}

body.dark .stat-card {
    background: var(--dark-card);
    border-color: rgba(255, 255, 255, 0.05);
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

.stat-icon {
    font-size: 2.5rem;
    margin-bottom: 15px;
    color: var(--primary-color);
}

.stat-value {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 5px;
}

.stat-label {
    color: #666;
    font-size: 0.9rem;
}

body.dark .stat-label {
    color: #aaa;
}

/* Formulários estilizados */
.form-container {
    background: var(--light-surface);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
}

body.dark .form-container {
    background: var(--dark-card);
}

.form-title {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 25px;
    color: var(--primary-color);
    border-left: 4px solid var(--secondary-color);
    padding-left: 15px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
}

.form-control, .form-select {
    border-radius: 12px;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    transition: var(--transition);
    background: transparent;
}

body.dark .form-control,
body.dark .form-select {
    border-color: #3a4a3a;
    color: white;
}

.form-control:focus, .form-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
}

.btn-primary-custom {
    background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-weight: 600;
    transition: var(--transition);
    color: white;
}

.btn-primary-custom:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
}

/* Tabelas responsivas */
.table-container {
    overflow-x: auto;
    background: var(--light-surface);
    border-radius: 20px;
    padding: 20px;
    transition: opacity 0.3s ease, max-height 0.3s ease;
}

body.dark .table-container {
    background: var(--dark-card);
}

.table-custom {
    width: 100%;
    border-collapse: collapse;
}

.table-custom th,
.table-custom td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

body.dark .table-custom th,
body.dark .table-custom td {
    border-bottom-color: rgba(255, 255, 255, 0.05);
}

.table-custom th {
    font-weight: 700;
    color: var(--primary-color);
}

/* Responsividade */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        width: 280px;
        transition: transform 0.3s ease;
    }
    
    .sidebar.collapsed {
        transform: translateX(-100%);
    }
    
    .sidebar.open {
        transform: translateX(0);
        box-shadow: 2px 0 30px rgba(0, 0, 0, 0.3);
    }
    
    .main {
        margin-left: 0;
        padding: 15px;
    }
    
    .menu-toggle {
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        font-size: 28px !important;
        width: auto;
        height: auto;
        padding: 8px 12px;
        margin-right: 10px;
        background: transparent;
        color: var(--primary-color) !important;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        transition: var(--transition);
    }
    
    .menu-toggle:hover {
        background: rgba(46, 125, 50, 0.1);
        transform: scale(1.1);
    }
    
    .menu-toggle:active {
        transform: scale(0.95);
    }
    
    .topbar {
        padding: 12px 15px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .welcome-card {
        padding: 25px;
        position: relative;
    }
    
    .welcome-card h2 {
        font-size: 1.5rem;
    }
    
    .welcome-card p {
        font-size: 0.95rem;
        line-height: 1.4;
        margin: 0;
    }
}

/* Loading animation */
.loading {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid rgba(76, 175, 80, 0.3);
    border-radius: 50%;
    border-top-color: var(--primary-color);
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Notificações */
.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 25px;
    background: var(--light-surface);
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    z-index: 2000;
    animation: slideInRight 0.3s ease;
    border-left: 4px solid var(--success-color);
}

.notification.error {
    border-left-color: var(--danger-color);
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
</style>
</head>
<body class="light">

<!-- Backdrop para fechar menu -->

<!-- Sidebar Modernizada -->

<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <i class="bi bi-list menu-toggle" id="menuToggle" title="Abrir/Fechar Menu"></i>
            <span class="page-title" id="pageTitle">Dashboard</span>
        </div>
        <div class="topbar-right">
            <i class="bi bi-brightness-high mode-toggle" id="toggleTheme"></i>

            <div class="stat-card">
                <div class="stat-icon">⏳</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    // Verificar usuário logado
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
        window.location.href = "login.html";
        return;
    }

    // Exibir nome do usuário
    const user = session.user;
    const { data: userData } = await supabaseClient.from("usuarios").select("nome").eq("id", user.id).single();
    const userName = userData?.nome || user.email;
    document.querySelector(".user-info span").textContent = userName;
    document.querySelector(".user-avatar").textContent = userName.charAt(0).toUpperCase();

    const menuItems = document.querySelectorAll(".sidebar ul li");
    const conteudo = document.getElementById("conteudoPrincipal");
    const toggle = document.getElementById("toggleTheme");
    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const pageTitle = document.getElementById("pageTitle");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");

    // Função para fechar o menu com sincronização
    function closeMenuMobile() {
        sidebar.classList.remove("open");
        sidebar.classList.add("collapsed");
        if(sidebarBackdrop) {
            sidebarBackdrop.classList.remove("active");
        }
    }

    // Função para abrir o menu com sincronização
    function openMenuMobile() {
        sidebar.classList.add("open");
        sidebar.classList.remove("collapsed");
        if(sidebarBackdrop && window.innerWidth <= 768) {
            sidebarBackdrop.classList.add("active");
        }
    }

    // Alternar menu mobile com suporte a backdrop
    menuToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        if(sidebar.classList.contains("open")) {
            closeMenuMobile();
        } else {
            openMenuMobile();
        }
    });

    // Fechar menu ao clicar no backdrop
    if(sidebarBackdrop) {
        sidebarBackdrop.addEventListener("click", () => {
            closeMenuMobile();
        });
    }

    // Fechar menu ao clicar fora no mobile
    document.addEventListener("click", (e) => {
        if (window.innerWidth <= 768 && sidebar.classList.contains("open") && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
            closeMenuMobile();
        }
    });

    // Alternar tema
    toggle.addEventListener("click", () => {
        const body = document.body;
        if (body.classList.contains("light")) {
            body.classList.remove("light");
            body.classList.add("dark");
            toggle.classList.remove("bi-brightness-high");
            toggle.classList.add("bi-moon");
            localStorage.setItem("tema", "dark");
        } else {
            body.classList.remove("dark");
            body.classList.add("light");
            toggle.classList.remove("bi-moon");
            toggle.classList.add("bi-brightness-high");
            localStorage.setItem("tema", "light");
        }
        showNotification("Tema alterado com sucesso!", "success");
    });

    // Aplicar tema salvo
    const tema = localStorage.getItem("tema");
    if (tema === "dark") {
        document.body.classList.remove("light");
        document.body.classList.add("dark");
        toggle.classList.remove("bi-brightness-high");
        toggle.classList.add("bi-moon");
    }

    // Função para mostrar notificações
    function showNotification(message, type = "success") {
        const notification = document.createElement("div");
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
            <span>${message}</span>
        `;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }

    function isOnline() {
        return window.navigator.onLine;
    }

    function getOfflineQueue() {
        const queueString = localStorage.getItem('offlineQueue');
        if (!queueString) return [];
        try {
            return JSON.parse(queueString);
        } catch (error) {
            console.error('Offline queue JSON inválido', error);
            return [];
        }
    }

    function setOfflineQueue(queue) {
        localStorage.setItem('offlineQueue', JSON.stringify(queue));
    }

    function enqueueOfflineInsert(table, record) {
        const queue = getOfflineQueue();
        queue.push({ table, record, attemptedAt: new Date().toISOString() });
        setOfflineQueue(queue);
        showNotification('Sem conexão, registro salvo localmente e será enviado quando online.', 'warning');
    }

    async function processOfflineQueue() {
        if (!isOnline()) return;
        const queue = getOfflineQueue();
        if (!queue.length) return;

        const successItems = [];
        for (const item of queue) {
            try {
                const { error } = await supabaseClient.from(item.table).insert([item.record]);
                if (!error) {
                    successItems.push(item);
                }
            } catch (err) {
                console.warn('Erro ao enviar item offline', err);
            }
        }

        if (successItems.length) {
            const remaining = queue.filter(item => !successItems.includes(item));
            setOfflineQueue(remaining);
            showNotification(`${successItems.length} registro(s) sincronizado(s) com o servidor.`, 'success');
        }
    }

    window.enqueueOfflineInsert = enqueueOfflineInsert;
    window.processOfflineQueue = processOfflineQueue;

    window.saveRecord = async (table, record) => {
        if (isOnline()) {
            const { error } = await supabaseClient.from(table).insert([record]);
            if (error) {
                enqueueOfflineInsert(table, record);
                return { error, offline: true };
            }
            return { success: true, offline: false };
        } else {
            enqueueOfflineInsert(table, record);
            return { success: true, offline: true };
        }
    };

    window.addEventListener('online', async () => {
        showNotification('Conexão restabelecida. Sincronizando dados em backlog...', 'success');
        await processOfflineQueue();
        await loadDashboardData();
    });

    window.addEventListener('offline', () => {
        showNotification('Sem conexão. Trabalhando no modo offline.', 'warning');
    });

    // Função para carregar dados do dashboard
    async function loadDashboardData() {
        try {
            // Buscar dados das tabelas (dados reais, conforme pedido)
            const [apontamentosRes, abastecimentosRes, pontoRes, equipamentosRes] = await Promise.all([

    // Função para gerar gráficos
    function generateCharts(apontamentos) {
        // Gráfico de apontamentos por mês
        const apontPorMes = {};
        apontamentos.forEach(a => {
            if (a.data) {
                const mes = a.data.substring(0, 7); // YYYY-MM
                apontPorMes[mes] = (apontPorMes[mes] || 0) + 1;
            }
        });

        const optionsApont = {
            series: [{
                name: 'Apontamentos',
                data: Object.values(apontPorMes)
            }],
            chart: {
                type: 'line',
                height: 300
            },
            xaxis: {
                categories: Object.keys(apontPorMes)
            },
            colors: ['#2e7d32']
        };

        const chartApont = new ApexCharts(document.querySelector("#chartApontamentos"), optionsApont);
        chartApont.render();

        // Gráfico de horas por colaborador
        const horasPorColab = {};
        apontamentos.forEach(a => {
            const colab = a.colaborador || 'Não informado';
            horasPorColab[colab] = (horasPorColab[colab] || 0) + (a.horas || 0);
        });

        const optionsColab = {
            series: [{
                name: 'Horas',
                data: Object.values(horasPorColab)
            }],
            chart: {
                type: 'bar',
                height: 300
            },
            xaxis: {
                categories: Object.keys(horasPorColab)
            },
            colors: ['#ff9800']
        };

        const chartColab = new ApexCharts(document.querySelector("#chartColaboradores"), optionsColab);
        chartColab.render();
    }

    function toggleTable(tableId) {
        const el = document.getElementById(tableId);
        if (!el) return;
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // Função para carregar arquivos HTML locais de forma assíncrona
    async function loadPageHTML(path) {
        try {
            const response = await fetch(path, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }
            return await response.text();
        } catch (error) {
            console.error(`Erro ao carregar ${path}:`, error);
            return `<div class="form-container"><h3 class="form-title">Erro ao carregar página</h3><p>${error.message}</p></div>`;
        }
    }

                        <div class="form-group">
                            <label>${field.label}</label>

                    `).join('')}
                    <button type="submit" class="btn btn-primary-custom">Salvar</button>
