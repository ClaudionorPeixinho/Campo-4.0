<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo 4.0 | Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#eef1f4;
}

.sidebar{
    position:fixed;
    width:250px;
    height:100vh;
    background:#1e2a2f;
    color:#fff;
    padding-top:20px;
}

.logo{
    text-align:center;
    font-size:18px;
    font-weight:600;
    padding-bottom:20px;
}

.sidebar a, .sidebar button{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 20px;
    width:100%;
    border:none;
    background:none;
    color:#cfd8dc;
    text-decoration:none;
    cursor:pointer;
    transition:0.3s;
}

.sidebar a:hover, .sidebar button:hover{
    background:#219963;
    color:white;
}

.main{
    margin-left:250px;
    padding:30px;
}

.card-dashboard{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.topbar{
    background:white;
    padding:15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🌿 Campo 4.0</div>

<a href="home.html"><i class="bi bi-house"></i> Home</a>
<a href="apontamento.html"><i class="bi bi-clock-history"></i> Apontamento</a>
<a href="cadastro_colaboradores.html"><i class="bi bi-people"></i> Colaboradores</a>
<a href="equipamentos.html"><i class="bi bi-truck"></i> Equipamentos</a>
<a href="relatorios.html"><i class="bi bi-bar-chart"></i> Relatórios</a>

<button id="menuAdmin" style="display:none;">
<i class="bi bi-gear"></i> Painel Admin
</button>

<hr>

<button id="btnSair">
<i class="bi bi-box-arrow-right"></i> Sair do Sistema
</button>

</div>

<div class="main">

<div class="topbar">
<div><strong>Dashboard</strong></div>
<div id="usuarioInfo"></div>
</div>

<div class="dashboard">

<div class="card-dashboard">
<h6>Total Usuários</h6>
<h3 id="totalUsuarios">0</h3>
</div>

<div class="card-dashboard">
<h6>Total Equipamentos</h6>
<h3 id="totalEquipamentos">0</h3>
</div>

</div>

</div>

<script>
const supabaseUrl = "https://szzfqkhibuejhodhkvjj.supabase.co";
const supabaseKey = "sb_publishable_hIEhtwoXoQKvu2SkQYr4Tg_7HuC1-G_";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let usuarioAtual;

// 🔒 Verifica login ao carregar
document.addEventListener("DOMContentLoaded", async () => {

    const { data:{session} } = await supabaseClient.auth.getSession();

    if(!session){
        window.location.href = "login.html";
        return;
    }

    usuarioAtual = session.user;

    document.getElementById("usuarioInfo").innerHTML =
    `<i class="bi bi-person-circle"></i> ${usuarioAtual.email}`;

    // Buscar nível do usuário
    const { data } = await supabaseClient
    .from("usuarios")
    .select("*")
    .eq("id", usuarioAtual.id)
    .single();

    if(data?.nivel === "admin"){
        document.getElementById("menuAdmin").style.display="flex";
    }

    carregarDashboard();
});

// 📊 Dashboard
async function carregarDashboard(){

    const { count:usuarios } = await supabaseClient
    .from("usuarios")
    .select("*",{count:"exact",head:true});

    document.getElementById("totalUsuarios").innerText = usuarios || 0;

    const { count:equip } = await supabaseClient
    .from("equipamentos")
    .select("*",{count:"exact",head:true});

    document.getElementById("totalEquipamentos").innerText = equip || 0;
}

// 🔓 BOTÃO SAIR (AGORA FUNCIONANDO CORRETAMENTE)
document.getElementById("btnSair").addEventListener("click", async function(){

    const confirmar = confirm("Deseja realmente sair do sistema?");
    if(!confirmar) return;

    try{
        await supabaseClient.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace("login.html");
    }catch(error){
        alert("Erro ao sair: " + error.message);
    }

});
</script>

</body>
</html>
