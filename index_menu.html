<script>
const supabaseUrl = "https://szzfqkhibuejhodhkvjj.supabase.co";
const supabaseKey = "sb_publishable_hIEhtwoXoQKvu2SkQYr4Tg_7HuC1-G_";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let usuarioAtual;

// 🔒 Verifica login ao carregar
document.addEventListener("DOMContentLoaded", async () => {

    const { data:{session} } = await supabaseClient.auth.getSession();

    if(!session){
        window.location.href = "login.html";
        return;
    }

    usuarioAtual = session.user;

    document.getElementById("usuarioInfo").innerHTML =
    `<i class="bi bi-person-circle"></i> ${usuarioAtual.email}`;

    // Buscar nível do usuário
    const { data } = await supabaseClient
    .from("usuarios")
    .select("*")
    .eq("id", usuarioAtual.id)
    .single();

    if(data?.nivel === "admin"){
        document.getElementById("menuAdmin").style.display="flex";
    }

    carregarDashboard();
});

// 📊 Dashboard
async function carregarDashboard(){

    const { count:usuarios } = await supabaseClient
    .from("usuarios")
    .select("*",{count:"exact",head:true});

    document.getElementById("totalUsuarios").innerText = usuarios || 0;

    const { count:equip } = await supabaseClient
    .from("equipamentos")
    .select("*",{count:"exact",head:true});

    document.getElementById("totalEquipamentos").innerText = equip || 0;
}

// 🔓 BOTÃO SAIR (AGORA FUNCIONANDO CORRETAMENTE)
document.getElementById("btnSair").addEventListener("click", async function(){

    const confirmar = confirm("Deseja realmente sair do sistema?");
    if(!confirmar) return;

    try{
        await supabaseClient.auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace("login.html");
    }catch(error){
        alert("Erro ao sair: " + error.message);
    }

});

function updateOfflineBanner() {
    const banner = document.getElementById('offlineBanner');
    if (!banner) return;
    if (navigator.onLine) {
        banner.classList.remove('visible');
    } else {
        banner.classList.add('visible');
    }
}

window.addEventListener('online', updateOfflineBanner);
window.addEventListener('offline', updateOfflineBanner);

document.addEventListener('DOMContentLoaded', () => {
    const retryButton = document.getElementById('retryConnection');
    if (retryButton) {
        retryButton.addEventListener('click', () => {
            updateOfflineBanner();
            if (navigator.onLine) {
                window.location.reload();
            }
        });
    }
    updateOfflineBanner();
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .catch(err => console.warn('SW registration falhou:', err));
    });
}
</script>
