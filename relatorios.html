<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios Executivos | Campo 4.0</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f4f6f9;}
.sidebar{
position:fixed;width:250px;height:100vh;
background:#1e2a2f;color:#fff;padding-top:20px;}
.sidebar a{
display:flex;padding:12px 20px;
color:#cfd8dc;text-decoration:none;}
.sidebar a:hover{background:#219963;color:white;}
.main{margin-left:250px;padding:30px;}
.card{
background:white;padding:20px;border-radius:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:25px;}
.kpi{
font-size:26px;font-weight:600;
}
.top-actions{
display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;}
</style>
</head>
<body>

<div class="sidebar">
<a href="index_menu.html">🏠 Dashboard</a>
<a href="relatorios.html">📊 Relatórios</a>
</div>

<div class="main">

<h2>📊 Painel Executivo</h2>

<div class="top-actions">
<input type="date" id="dataInicio" class="form-control" style="max-width:200px;">
<input type="date" id="dataFim" class="form-control" style="max-width:200px;">
<button class="btn btn-success" onclick="carregarDados()">Filtrar</button>
<button class="btn btn-danger" onclick="exportarPDF()">Exportar PDF</button>
<button class="btn btn-primary" onclick="exportarExcel()">Exportar Excel</button>
</div>

<div class="row">

<div class="col-md-3">
<div class="card text-center">
<div>Total Usuários</div>
<div id="kpiUsuarios" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div>Total Equipamentos</div>
<div id="kpiEquipamentos" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div>Total Apontamentos</div>
<div id="kpiApontamentos" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div>Total Horas</div>
<div id="kpiHoras" class="kpi">0</div>
</div>
</div>

</div>

<div class="card">
<h5>Usuários por Nível</h5>
<canvas id="graficoUsuarios"></canvas>
</div>

<div class="card">
<h5>Apontamentos por Dia</h5>
<canvas id="graficoApontamentos"></canvas>
</div>

</div>

<script>
const supabaseUrl = "https://szzfqkhibuejhodhkvjj.supabase.co";
const supabaseKey = "sb_publishable_hIEhtwoXoQKvu2SkQYr4Tg_7HuC1-G_";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let chartUsuarios, chartApontamentos;

document.addEventListener("DOMContentLoaded", async ()=>{
const { data:{session} } = await supabaseClient.auth.getSession();
if(!session){ window.location.href="login.html"; return; }
carregarDados();
});

// =====================
// CARREGAR DADOS
// =====================
async function carregarDados(){

const inicio = document.getElementById("dataInicio").value;
const fim = document.getElementById("dataFim").value;

// USUÁRIOS
const { data:usuarios } = await supabaseClient.from("usuarios").select("*");
document.getElementById("kpiUsuarios").innerText = usuarios.length;

// EQUIPAMENTOS
const { data:equip } = await supabaseClient.from("equipamentos").select("*");
document.getElementById("kpiEquipamentos").innerText = equip.length;

// APONTAMENTOS
let query = supabaseClient.from("apontamentos").select("*");

if(inicio && fim){
query = query.gte("data",inicio).lte("data",fim);
}

const { data:apont } = await query;

document.getElementById("kpiApontamentos").innerText = apont.length;

let totalHoras = 0;
let dias = {};
apont.forEach(a=>{
totalHoras += Number(a.horas || 0);
dias[a.data] = (dias[a.data] || 0) + 1;
});

document.getElementById("kpiHoras").innerText = totalHoras.toFixed(1);

// GRÁFICO USUÁRIOS
let admin=0, func=0;
usuarios.forEach(u=>{
if(u.nivel==="admin") admin++; else func++;
});

if(chartUsuarios) chartUsuarios.destroy();
chartUsuarios = new Chart(document.getElementById("graficoUsuarios"),{
type:'doughnut',
data:{
labels:['Admin','Funcionário'],
datasets:[{data:[admin,func],backgroundColor:['#0d6efd','#20c997']}]
}
});

// GRÁFICO APONTAMENTOS
if(chartApontamentos) chartApontamentos.destroy();
chartApontamentos = new Chart(document.getElementById("graficoApontamentos"),{
type:'line',
data:{
labels:Object.keys(dias),
datasets:[{
label:'Apontamentos',
data:Object.values(dias),
borderColor:'#6610f2',
backgroundColor:'rgba(102,16,242,0.2)',
fill:true,
tension:0.3
}]
}
});

}

// =====================
// EXPORTAR PDF
// =====================
async function exportarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("Relatório Executivo - Campo 4.0", 20, 20);
doc.text("Total Usuários: "+document.getElementById("kpiUsuarios").innerText,20,40);
doc.text("Total Equipamentos: "+document.getElementById("kpiEquipamentos").innerText,20,50);
doc.text("Total Apontamentos: "+document.getElementById("kpiApontamentos").innerText,20,60);
doc.text("Total Horas: "+document.getElementById("kpiHoras").innerText,20,70);

doc.save("relatorio_campo40.pdf");
}

// =====================
// EXPORTAR EXCEL
// =====================
async function exportarExcel(){
const { data } = await supabaseClient.from("apontamentos").select("*");
const ws = XLSX.utils.json_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Relatorio");
XLSX.writeFile(wb, "relatorio_campo40.xlsx");
}

// =====================
// AUTO UPDATE (tempo real leve)
// =====================
setInterval(()=>{ carregarDados(); }, 30000);

</script>

</body>
</html>
