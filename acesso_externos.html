<body>

  <script>
    const isSPAMode = new URLSearchParams(window.location.search).get('spa') === 'true';
    if(isSPAMode) {
      document.body.classList.add('spa-mode');
    }
    
    window.sair = () => {
      if(isSPAMode && window.parent && window.parent.app) {
        window.parent.app.returnToDashboard();
      } else {
        window.location.href = "index_menu.html";
      }
    }
  </script>

  <div class="container-fluid">

    <!-- HEADER -->
    <div class="header">
      <div>
        <h1><i class="fas fa-external-link-alt"></i> Acesso Externos</h1>
        <p>Links para plataformas e serviços externos</p>
      </div>
      <div class="header-buttons">
        <button class="btn-sair" onclick="sair()">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </div>
    </div>

    <!-- PLATFORMS GRID -->
    <div class="platforms-grid" id="platformsGrid">
      <!-- Platform cards will be inserted here by JS -->
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p><i class="fas fa-lock"></i> Links salvos localmente no dispositivo | Campo 4.0 &copy; 2026</p>
    </div>

  </div>

  <script>
    // Platform data
    const platforms = [
      {
        id: 'volvo_connect',
        name: 'Volvo Connect',
        desc: 'Plataforma de conectividade Volvo',
        icon: 'fas fa-truck-moving',
        defaultLink: 'https://volvoconnect.com'
      },
      {
        id: 'operations_center',
        name: 'Operations Center',
        desc: 'Centro de operações agrícolas',
        icon: 'fas fa-cogs',
        defaultLink: 'https://operationscenter.deere.com'
      },
      {
        id: 'clima_tempo',
        name: 'Clima Tempo',
        desc: 'Previsão do tempo para o campo',
        icon: 'fas fa-cloud-sun',
        defaultLink: 'https://www.climatempo.com.br'
      },
      {
        id: 'senar',
        name: 'Senar',
        desc: 'Serviço Nacional de Aprendizagem Rural',
        icon: 'fas fa-graduation-cap',
        defaultLink: 'https://www.senar.org.br'
      },
      {
        id: 'dji_drones',
        name: 'DJI Drones',
        desc: 'Tecnologia de drones agrícolas',
        icon: 'fas fa-helicopter',
        defaultLink: 'https://www.dji.com/agriculture'
      },
      {
        id: 'trimble',
        name: 'Trimble',
        desc: 'Soluções de precisão agrícola',
        icon: 'fas fa-satellite-dish',
        defaultLink: 'https://www.trimble.com/agriculture'
      }
    ];

    // Load saved links from localStorage
    function loadLinks() {
      const saved = localStorage.getItem('campo40_external_links');
      return saved ? JSON.parse(saved) : {};
    }

    // Save links to localStorage
    function saveLinks(links) {
      localStorage.setItem('campo40_external_links', JSON.stringify(links));
    }

    // Render platform cards
    function renderPlatforms() {
      const grid = document.getElementById('platformsGrid');
      if (!grid) return;

      const savedLinks = loadLinks();

      platforms.forEach(platform => {
        const savedLink = savedLinks[platform.id] || '';
        const card = document.createElement('div');
        card.className = 'platform-card';
        card.innerHTML = `
          <div class="platform-header">
            <div class="platform-icon">
              <i class="${platform.icon}"></i>
            </div>
            <div>
              <h3 class="platform-name">${platform.name}</h3>
              <p class="platform-desc">${platform.desc}</p>
            </div>
          </div>
          <div class="link-section">
            <div class="input-row">
              <input type="url" class="form-control" id="input_${platform.id}" 
                     placeholder="https://..." 
                     value="${savedLink || platform.defaultLink}">
              <button class="btn btn-success btn-action" onclick="openLink('${platform.id}')" title="Abrir link">
                <i class="fas fa-external-link-alt"></i>
              </button>
              <button class="btn btn-primary btn-action" onclick="saveLink('${platform.id}')" title="Salvar link">
                <i class="fas fa-save"></i>
              </button>
            </div>
            <div class="saved-badge" id="badge_${platform.id}">Link salvo!</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Open link in new tab
    window.openLink = function(platformId) {
      const input = document.getElementById(`input_${platformId}`);
      if (!input) return;
      let url = input.value.trim();
      if (!url) {
        alert('Por favor, insira um link válido.');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        input.value = url;
      }
      window.open(url, '_blank');
    }

    // Save link to localStorage
    window.saveLink = function(platformId) {
      const input = document.getElementById(`input_${platformId}`);
      if (!input) return;
      let url = input.value.trim();
      if (!url) {
        alert('Por favor, insira um link válido.');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        input.value = url;
      }
      
      const savedLinks = loadLinks();
      savedLinks[platformId] = url;
      saveLinks(savedLinks);
      
      // Show saved badge
      const badge = document.getElementById(`badge_${platformId}`);
      if (badge) {
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 2000);
      }
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => {
      renderPlatforms();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js', { scope: './' })
                .catch(err => console.warn('SW registration falhou:', err));
        });
    }
  </script>
</body>
</html>
