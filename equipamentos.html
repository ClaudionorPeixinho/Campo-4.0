<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#198754">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Campo 4.0">
<link rel="apple-touch-icon" href="Img/tecnologia-campo5.png">
<link rel="stylesheet" href="css/app-base.css">
<title>Cadastro de Equipamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/StyleApto.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/spa-utils.js"></script>

<style>
.acoes-equipamentos {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.acoes-tabela {
  white-space: nowrap;
}

@media (max-width: 576px) {
  .acoes-formulario,
  .acoes-equipamentos {
    display: grid !important;
    grid-template-columns: 1fr;
  }

  .acoes-formulario .btn,
  .acoes-equipamentos .btn {
    width: 100%;
  }

  .table-responsive {
    font-size: 0.9rem;
  }
}
</style>
</head>

<body>

<nav class="navbar navbar-custom px-3">
<span class="navbar-brand">
<div class="header d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-truck"></i> Campo 4.0 - Cadastro de Equipamentos</h3>
</div>
</span>

<a class="nav-link text-white" href="javascript:void(0)" onclick="sair()">
<i class="bi bi-box-arrow-left"></i> Sair
</a>
</nav>

<div class="container mt-4">

<div id="formTela" class="card shadow card-custom">
<div class="card-body">

<h6 class="mb-3 text-success">
<i class="bi bi-clipboard-plus"></i> Dados do Equipamento
</h6>

<form id="formEquipamento">
<div class="row g-2" id="formCampos">

<div class="col-md-3 col-6">
<label>Nº Frota</label>
<input type="text" id="frota" class="form-control" required>
</div>

<div class="col-md-3 col-6">
<label>Modelo</label>
<input type="text" id="modelo" class="form-control" required>
</div>

<div class="col-md-3 col-6">
<label>Tipo Operação</label>
<input type="text" id="operacao" class="form-control" required>
</div>

<div class="col-md-3 col-6">
<label>Nº Tag</label>
<input type="text" id="tag" class="form-control">
</div>

<div class="col-md-3 col-6">
<label>Categoria</label>
<select id="categoria" class="form-select" required>
<option value="">Selecione</option>
<option>Caminhão</option>
<option>Trator</option>
<option>Colhedora</option>
<option>Implemento</option>
</select>
</div>

</div>

<div class="mt-3 text-end acoes-formulario">
<button type="submit" class="btn btn-success">
<i class="bi bi-save"></i> Salvar
</button>

<button type="button" class="btn btn-secondary" onclick="limparFormulario()">
Cancelar
</button>

<button type="button" id="btnToggle" class="btn btn-primary">
<i class="bi bi-table"></i> Registros
</button>
</div>

</form>
</div>
</div>

<div id="tabelaTela" class="mt-4" style="display:none;">

<div class="card p-2 mb-2">
<div class="row g-2 align-items-end">

<div class="col-md-4 col-12">
<input type="text" id="filtroFrota" class="form-control" placeholder="Filtrar por frota">
</div>

<div class="col-md-4 col-12">
<input type="text" id="filtroModelo" class="form-control" placeholder="Filtrar por modelo">
</div>

<div class="col-md-4 col-12">
<div class="acoes-equipamentos">
<button type="button" class="btn btn-primary" id="btnBuscarTabela">
<i class="bi bi-search"></i> Buscar
</button>

<button type="button" class="btn btn-secondary" id="btnLimparFiltros">
<i class="bi bi-eraser"></i> Limpar
</button>

<button type="button" class="btn btn-dark" id="btnFecharTabela">
<i class="bi bi-x-lg"></i> Fechar
</button>
</div>
</div>

</div>
</div>

<div class="card p-2 table-responsive">
<table class="table table-striped table-sm">
<thead>
<tr>
<th>Frota</th>
<th>Modelo</th>
<th>Operação</th>
<th>Tag</th>
<th>Categoria</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaDados"></tbody>
</table>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/offline-sync.js"></script>
<script defer src="js/equipamentos.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" })
            .catch(err => console.warn("SW registration falhou:", err));
    });
}
</script>
</body>
</html>
