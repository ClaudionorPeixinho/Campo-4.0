<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo 4.0 - Cadastro Equipamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/supabase.js"></script>
<script defer src="js/equipamentos.js"></script>

<style>
body{ background:#f4f6f9; }

.navbar-custom{
    background:#1f7a3e;
}

.card-custom{
    border-left:5px solid #1f7a3e;
    border-radius:12px;
}

.form-control{
    height:32px;
    font-size:13px;
}

.btn-custom{
    font-size:13px;
    border-radius:6px;
    padding:5px 10px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark navbar-custom px-3">
    <span class="navbar-brand">
        <i class="bi bi-truck"></i> Campo 4.0 - Cadastro Equipamentos
    </span>
    <a href="index_menu.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right"></i> Sair
    </a>
</nav>

<div class="container mt-4">

<div class="card shadow card-custom">
<div class="card-body">

<h6 class="text-success mb-3">
<i class="bi bi-clipboard-plus"></i> Novo Equipamento
</h6>

<form id="formEquipamento">
<div class="row g-2">

<div class="col-md-3">
<label>Nº Frota</label>
<input type="text" id="frota" class="form-control" required>
</div>

<div class="col-md-3">
<label>Modelo</label>
<input type="text" id="modelo" class="form-control" required>
</div>

<div class="col-md-3">
<label>Tipo Operação</label>
<input type="text" id="operacao" class="form-control" required>
</div>

<div class="col-md-3">
<label>Nº Tag</label>
<input type="text" id="tag" class="form-control">
</div>

<div class="col-md-3">
<label>Categoria</label>
<select id="categoria" class="form-select" required>
<option value="">Selecione</option>
<option>Caminhão</option>
<option>Trator</option>
<option>Colhedora</option>
<option>Implemento</option>
</select>
</div>

</div>

<hr class="my-3">

<div class="d-flex gap-2 flex-wrap">
<button type="submit" class="btn btn-success btn-custom">
<i class="bi bi-save"></i> Salvar
</button>

<button type="button" id="btnMostrar" class="btn btn-primary btn-custom">
<i class="bi bi-table"></i> Mostrar Registros
</button>
</div>

</form>

<div id="areaTabela" class="mt-4" style="display:none;">

<div class="d-flex gap-2 mb-2 flex-wrap">

<input type="text" id="filtroFrota" class="form-control" placeholder="Frota" style="width:120px;">
<input type="text" id="filtroModelo" class="form-control" placeholder="Modelo" style="width:150px;">

<button id="btnFiltrar" class="btn btn-dark btn-custom">
<i class="bi bi-search"></i>
</button>

<button id="btnLimparFiltro" class="btn btn-secondary btn-custom">
<i class="bi bi-eraser"></i>
</button>

</div>

<table class="table table-striped table-bordered">
<thead class="table-success">
<tr>
<th>Frota</th>
<th>Modelo</th>
<th>Operação</th>
<th>Tag</th>
<th>Categoria</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaDados"></tbody>
</table>

</div>

</div>
</div>
</div>

</body>
</html>
